<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業收藏管理系統 V4 - 檔案對接版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        .aspect-card { aspect-ratio: 2 / 3; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .active-cat { background-color: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-20">

    <nav class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-40 border-b">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
                </div>
                <h1 class="text-xl font-black tracking-tighter">COLLECTION MANAGER</h1>
            </div>
            
            <div class="flex flex-1 w-full max-w-xl">
                <input type="text" id="searchInput" oninput="renderGallery()" placeholder="搜尋名稱、備註、放置位置..." 
                    class="w-full px-5 py-2 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 transition">
            </div>

            <div class="flex gap-2">
                <button onclick="openAddModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-2xl font-bold shadow-md transition-all active:scale-95">新增項目</button>
                <div class="flex bg-white rounded-2xl shadow-sm border px-2 items-center">
                    <button onclick="exportData()" title="匯出備份" class="p-2 text-slate-400 hover:text-indigo-600">📤</button>
                    <input type="file" id="importFile" class="hidden" onchange="importData(event)">
                    <button onclick="document.getElementById('importFile').click()" title="匯入資料" class="p-2 text-slate-400 hover:text-indigo-600">📥</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8 flex flex-col md:flex-row gap-8">
        <aside class="w-full md:w-64 space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <h3 class="text-xs font-bold text-slate-400 tracking-widest uppercase mb-4">收藏統計</h3>
                <div class="space-y-4">
                    <div>
                        <p class="text-xs text-slate-400">總品項數量</p>
                        <p class="text-2xl font-black text-slate-800" id="statCount">0</p>
                    </div>
                    <div>
                        <p class="text-xs text-slate-400">總估計價值</p>
                        <p class="text-xl font-black text-indigo-600">NT$ <span id="statPrice">0</span></p>
                    </div>
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-4 px-2">
                    <h3 class="text-xs font-bold text-slate-400 tracking-widest uppercase">分類篩選</h3>
                    <button onclick="openManageModal('categories')" class="text-[10px] bg-slate-200 px-2 py-1 rounded-md">管理</button>
                </div>
                <div id="categoryList" class="flex flex-wrap md:flex-col gap-2"></div>
            </div>
        </aside>

        <main class="flex-1">
            <div id="gallery" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
        </main>
    </div>

    <div id="itemModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2rem] max-w-3xl w-full max-h-[90vh] overflow-y-auto shadow-2xl p-8 md:p-10">
            <div class="flex justify-between items-center mb-8">
                <h2 id="modalTitle" class="text-2xl font-black">編輯收藏項目</h2>
                <button onclick="closeModal('itemModal')" class="text-slate-300 hover:text-slate-900 text-2xl">✕</button>
            </div>
            
            <form id="itemForm" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <input type="hidden" id="itemId">
                
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">產品名稱 *</label>
                    <input type="text" id="itemName" required class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">數量</label>
                    <input type="number" id="itemQty" value="1" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">分類項目</label>
                    <select id="itemCategory" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none"></select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">購入價格 (TWD)</label>
                    <input type="number" id="itemPrice" value="0" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase text-indigo-600">放置點 (如:1樓櫥窗)</label>
                    <input type="text" id="itemLocation" placeholder="存放位置" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase flex justify-between">
                        物況/版本 <span onclick="openManageModal('statuses')" class="text-indigo-500 cursor-pointer">+</span>
                    </label>
                    <select id="itemStatus" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none"></select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase flex justify-between">
                        來源管道 <span onclick="openManageModal('sources')" class="text-indigo-500 cursor-pointer">+</span>
                    </label>
                    <select id="itemSource" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none"></select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">發行/版權日期</label>
                    <input type="text" id="itemDate" placeholder="YYYY-MM-DD" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none">
                </div>

                <div class="md:col-span-3">
                    <label class="block text-xs font-bold text-indigo-500 mb-2 uppercase">上傳收藏照 (可選多張，最多5張)</label>
                    <div class="flex items-center justify-center w-full">
                        <label class="flex flex-col w-full h-32 border-4 border-dashed border-slate-100 hover:bg-slate-50 hover:border-indigo-300 transition group rounded-2xl cursor-pointer">
                            <div class="flex flex-col items-center justify-center pt-7">
                                <p class="text-sm text-slate-400 group-hover:text-indigo-500 transition">點擊或拖放圖片至此</p>
                            </div>
                            <input type="file" id="itemImages" accept="image/*" multiple class="hidden" />
                        </label>
                    </div>
                </div>

                <div class="md:col-span-3">
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">備註 (如內容物、盒況細節)</label>
                    <textarea id="itemNote" rows="3" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none resize-none"></textarea>
                </div>

                <div class="md:col-span-3 flex justify-end gap-3 pt-6 border-t mt-4">
                    <button type="button" onclick="closeModal('itemModal')" class="px-8 py-3 text-slate-400 font-bold hover:text-slate-600">取消</button>
                    <button type="submit" class="px-12 py-3 bg-indigo-600 text-white rounded-2xl font-black shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all">儲存至資料庫</button>
                </div>
            </form>
        </div>
    </div>

    <div id="detailModal" class="hidden fixed inset-0 bg-slate-950/95 flex items-center justify-center p-0 md:p-10 z-50">
        <div class="bg-white md:rounded-[3rem] w-full max-w-6xl h-full md:h-auto overflow-hidden flex flex-col md:flex-row shadow-2xl">
            <div class="w-full md:w-3/5 bg-slate-900 flex flex-col h-[40vh] md:h-[75vh] relative">
                <div class="flex-1 flex items-center justify-center overflow-hidden p-4">
                    <img id="detailMainImg" src="" class="max-w-full max-h-full object-contain shadow-2xl transition-all duration-500">
                </div>
                <div id="detailThumbnails" class="h-24 bg-black/20 flex gap-2 p-4 overflow-x-auto no-scrollbar justify-center"></div>
                <button onclick="changeDetailImg(-1)" class="absolute left-4 top-1/2 -translate-y-1/2 w-12 h-12 bg-white/10 text-white rounded-full backdrop-blur-md hover:bg-white/20 transition text-xl">❮</button>
                <button onclick="changeDetailImg(1)" class="absolute right-4 top-1/2 -translate-y-1/2 w-12 h-12 bg-white/10 text-white rounded-full backdrop-blur-md hover:bg-white/20 transition text-xl">❯</button>
            </div>
            
            <div class="w-full md:w-2/5 p-8 md:p-12 flex flex-col overflow-y-auto">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <div class="flex gap-2 items-center mb-2">
                            <span id="detailCat" class="text-[10px] bg-indigo-600 text-white px-3 py-1 rounded-full font-black uppercase tracking-widest"></span>
                            <span id="detailQty" class="text-[10px] bg-slate-100 text-slate-500 px-3 py-1 rounded-full font-bold"></span>
                        </div>
                        <h2 id="detailName" class="text-3xl font-black text-slate-900 leading-tight"></h2>
                        <p id="detailDate" class="text-sm text-slate-400 mt-1"></p>
                    </div>
                    <button onclick="closeModal('detailModal')" class="text-slate-300 hover:text-slate-900 text-3xl transition">✕</button>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <p class="text-[10px] text-slate-400 font-black uppercase mb-1">存放位置</p>
                        <p id="detailLocation" class="text-sm font-bold text-indigo-600"></p>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <p class="text-[10px] text-slate-400 font-black uppercase mb-1">物品狀態</p>
                        <p id="detailStatus" class="text-sm font-bold text-slate-700"></p>
                    </div>
                    <div class="bg-indigo-50 p-4 rounded-2xl border border-indigo-100 col-span-2 flex justify-between items-center">
                        <div>
                            <p class="text-[10px] text-indigo-400 font-black uppercase mb-1">購入/市場價格</p>
                            <p class="text-2xl font-black text-indigo-600">NT$ <span id="detailPrice">0</span></p>
                        </div>
                        <p id="detailSource" class="text-xs bg-white px-3 py-1 rounded-lg shadow-sm font-bold text-indigo-400"></p>
                    </div>
                </div>

                <div class="flex-1 bg-slate-50/50 p-6 rounded-3xl border border-dashed border-slate-200">
                    <p class="text-[10px] text-slate-400 font-black uppercase mb-3 tracking-widest">備註與詳細內容物</p>
                    <p id="detailNote" class="text-slate-600 text-sm whitespace-pre-wrap leading-loose"></p>
                </div>

                <div class="mt-10 flex gap-3">
                    <button id="editBtn" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all active:scale-95">編輯資料</button>
                    <button id="deleteBtn" class="px-6 py-4 text-rose-400 hover:text-rose-600 font-bold transition">移除</button>
                </div>
            </div>
        </div>
    </div>

    <div id="manageModal" class="hidden fixed inset-0 bg-slate-900/50 flex items-center justify-center p-4 z-[60]">
        <div class="bg-white rounded-[2rem] max-w-sm w-full p-8 shadow-2xl">
            <h3 id="manageTitle" class="font-black text-lg mb-6 text-slate-800">管理標籤</h3>
            <div class="flex gap-2 mb-6">
                <input type="text" id="newOptionInput" placeholder="輸入標籤名稱..." class="flex-1 bg-slate-100 border-none rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                <button onclick="addOption()" class="bg-indigo-600 text-white px-5 rounded-xl font-bold hover:bg-indigo-700 transition">+</button>
            </div>
            <ul id="optionList" class="max-h-60 overflow-y-auto divide-y border border-slate-100 rounded-2xl"></ul>
            <button onclick="closeModal('manageModal')" class="w-full mt-6 py-3 bg-slate-100 rounded-xl font-bold text-slate-500 hover:bg-slate-200 transition">完成</button>
        </div>
    </div>

    <script>
        const db = new Dexie("CollectionV4DB");
        db.version(4).stores({
            items: '++id, name, category, status, source, price, location, date',
            categories: '++id, name',
            statuses: '++id, name',
            sources: '++id, name'
        });

        let currentCategory = '全部';
        let currentDetailImages = [];
        let currentDetailIdx = 0;
        let manageTarget = '';

        db.on("ready", async () => {
            if (await db.categories.count() === 0) await db.categories.bulkAdd([{name:'遊戲'},{name:'週邊'},{name:'光碟'},{name:'書籍'}]);
            if (await db.statuses.count() === 0) await db.statuses.bulkAdd([{name:'全新未拆'},{name:'全新'},{name:'二手'},{name:'已拆'}]);
            if (await db.sources.count() === 0) await db.sources.bulkAdd([{name:'購入'},{name:'蝦皮購買'},{name:'非賣品'},{name:'贈品'}]);
            renderUI();
        });

        async function renderUI() {
            renderSidebar();
            renderGallery();
            renderSelects();
            updateStats();
        }

        async function renderSidebar() {
            const cats = await db.categories.toArray();
            const container = document.getElementById('categoryList');
            let html = `<button onclick="setCat('全部')" class="px-5 py-2 rounded-xl text-xs font-black transition ${currentCategory==='全部'?'active-cat':'bg-white text-slate-400 border border-slate-100 shadow-sm'}">全部收藏</button>`;
            cats.forEach(c => {
                const active = currentCategory === c.name ? 'active-cat' : 'bg-white text-slate-400 border border-slate-100 shadow-sm hover:bg-slate-50';
                html += `<button onclick="setCat('${c.name}')" class="px-5 py-2 rounded-xl text-xs font-black transition ${active}">${c.name}</button>`;
            });
            container.innerHTML = html;
        }

        async function renderGallery() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const items = await db.items.toArray();
            const container = document.getElementById('gallery');
            container.innerHTML = '';

            const filtered = items.filter(i => {
                const matchCat = currentCategory === '全部' || i.category === currentCategory;
                const matchSearch = i.name.toLowerCase().includes(search) || 
                                   (i.note && i.note.toLowerCase().includes(search)) ||
                                   (i.location && i.location.toLowerCase().includes(search));
                return matchCat && matchSearch;
            });

            filtered.reverse().forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-2xl hover:-translate-y-1 transition duration-500 cursor-pointer group";
                card.onclick = () => showDetail(item.id);
                card.innerHTML = `
                    <div class="aspect-card bg-slate-50 relative overflow-hidden">
                        <img src="${item.images?.[0] || 'https://via.placeholder.com/400x600?text=NO+IMAGE'}" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-4">
                            <p class="text-white text-[10px] font-bold">📍 ${item.location || '未標記位置'}</p>
                        </div>
                    </div>
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-[9px] bg-indigo-50 text-indigo-500 px-2 py-0.5 rounded-md font-black uppercase">${item.category}</span>
                            <span class="text-[9px] text-slate-300 font-bold">QTY: ${item.qty || 1}</span>
                        </div>
                        <h4 class="font-black text-slate-800 truncate text-sm">${item.name}</h4>
                        <p class="text-[10px] text-slate-400 mt-1">${item.date || ''}</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function renderSelects() {
            const cats = await db.categories.toArray();
            const stats = await db.statuses.toArray();
            const srcs = await db.sources.toArray();
            document.getElementById('itemCategory').innerHTML = cats.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');
            document.getElementById('itemStatus').innerHTML = stats.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');
            document.getElementById('itemSource').innerHTML = srcs.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');
        }

        async function updateStats() {
            const items = await db.items.toArray();
            const total = items.reduce((sum, i) => sum + Number(i.price || 0), 0);
            document.getElementById('statCount').innerText = items.length;
            document.getElementById('statPrice').innerText = total.toLocaleString();
        }

        function openAddModal() {
            document.getElementById('itemForm').reset();
            document.getElementById('itemId').value = '';
            document.getElementById('modalTitle').innerText = '新增收藏項目';
            document.getElementById('itemModal').classList.remove('hidden');
        }

        document.getElementById('itemForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('itemId').value;
            const files = document.getElementById('itemImages').files;
            
            let images = [];
            if (files.length > 0) {
                for (let i = 0; i < Math.min(files.length, 5); i++) {
                    images.push(await toBase64(files[i]));
                }
            }

            const data = {
                name: document.getElementById('itemName').value,
                qty: document.getElementById('itemQty').value,
                category: document.getElementById('itemCategory').value,
                price: Number(document.getElementById('itemPrice').value),
                location: document.getElementById('itemLocation').value,
                status: document.getElementById('itemStatus').value,
                source: document.getElementById('itemSource').value,
                date: document.getElementById('itemDate').value,
                note: document.getElementById('itemNote').value
            };

            if (id) {
                const old = await db.items.get(Number(id));
                data.images = images.length > 0 ? images : old.images;
                await db.items.update(Number(id), data);
            } else {
                data.images = images;
                await db.items.add(data);
            }
            
            closeModal('itemModal');
            renderUI();
        };

        async function showDetail(id) {
            const item = await db.items.get(id);
            currentDetailImages = item.images || [];
            currentDetailIdx = 0;

            document.getElementById('detailName').innerText = item.name;
            document.getElementById('detailQty').innerText = `數量: ${item.qty || 1}`;
            document.getElementById('detailPrice').innerText = Number(item.price).toLocaleString();
            document.getElementById('detailCat').innerText = item.category;
            document.getElementById('detailStatus').innerText = item.status;
            document.getElementById('detailSource').innerText = item.source;
            document.getElementById('detailLocation').innerText = item.location || '未標註';
            document.getElementById('detailDate').innerText = `發行/版權日: ${item.date || '未知'}`;
            document.getElementById('detailNote').innerText = item.note || '無詳細備註...';

            updateDetailImg();
            document.getElementById('editBtn').onclick = () => openEditItem(item);
            document.getElementById('deleteBtn').onclick = () => deleteItem(item.id);
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function updateDetailImg() {
            const main = document.getElementById('detailMainImg');
            const thumbContainer = document.getElementById('detailThumbnails');
            if (currentDetailImages.length > 0) {
                main.src = currentDetailImages[currentDetailIdx];
                thumbContainer.innerHTML = currentDetailImages.map((img, idx) => `
                    <img src="${img}" onclick="setDetailIdx(${idx})" class="h-full aspect-square object-cover rounded-xl cursor-pointer border-2 transition-all ${idx===currentDetailIdx?'border-indigo-500 scale-110 shadow-lg':'border-transparent opacity-50'}">
                `).join('');
            } else {
                main.src = 'https://via.placeholder.com/600x800?text=NO+IMAGE+UPLOADED';
                thumbContainer.innerHTML = '';
            }
        }

        function openEditItem(item) {
            closeModal('detailModal');
            document.getElementById('itemId').value = item.id;
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemQty').value = item.qty || 1;
            document.getElementById('itemCategory').value = item.category;
            document.getElementById('itemPrice').value = item.price;
            document.getElementById('itemLocation').value = item.location || '';
            document.getElementById('itemStatus').value = item.status;
            document.getElementById('itemSource').value = item.source;
            document.getElementById('itemDate').value = item.date || '';
            document.getElementById('itemNote').value = item.note;
            document.getElementById('modalTitle').innerText = '編輯收藏資訊';
            document.getElementById('itemModal').classList.remove('hidden');
        }

        async function openManageModal(table) {
            manageTarget = table;
            const titles = { categories: '管理分類標籤', statuses: '管理物況/版本', sources: '管理來源/管道' };
            document.getElementById('manageTitle').innerText = titles[table];
            renderOptions();
            document.getElementById('manageModal').classList.remove('hidden');
        }

        async function renderOptions() {
            const items = await db[manageTarget].toArray();
            document.getElementById('optionList').innerHTML = items.map(i => `
                <li class="flex justify-between items-center p-4 text-sm font-bold text-slate-600">
                    ${i.name}
                    <button onclick="deleteOption(${i.id})" class="text-rose-400 hover:text-rose-600">✕</button>
                </li>
            `).join('');
        }

        async function addOption() {
            const input = document.getElementById('newOptionInput');
            if (input.value.trim()) {
                await db[manageTarget].add({name: input.value.trim()});
                input.value = '';
                renderOptions(); renderSelects(); renderSidebar();
            }
        }

        async function deleteOption(id) {
            if (confirm('確定移除此標籤？')) {
                await db[manageTarget].delete(id);
                renderOptions(); renderSelects(); renderSidebar();
            }
        }

        // 基本操作
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function setCat(cat) { currentCategory = cat; renderUI(); }
        function setDetailIdx(idx) { currentDetailIdx = idx; updateDetailImg(); }
        function changeDetailImg(step) {
            if (currentDetailImages.length === 0) return;
            currentDetailIdx = (currentDetailIdx + step + currentDetailImages.length) % currentDetailImages.length;
            updateDetailImg();
        }
        function toBase64(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
            });
        }
        async function deleteItem(id) {
            if (confirm('確定要移除此收藏？')) {
                await db.items.delete(id); closeModal('detailModal'); renderUI();
            }
        }

        // 匯出/匯入
        async function exportData() {
            const data = {
                items: await db.items.toArray(),
                categories: await db.categories.toArray(),
                statuses: await db.statuses.toArray(),
                sources: await db.sources.toArray(),
                version: 4
            };
            const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `收藏總庫備份_V4_${new Date().toLocaleDateString()}.json`;
            a.click();
        }

        async function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (confirm(`準備匯入 ${data.items?.length || 0} 筆資料。建議匯入前先備份，是否繼續？`)) {
                        if (data.categories) await db.categories.bulkPut(data.categories);
                        if (data.statuses) await db.statuses.bulkPut(data.statuses);
                        if (data.sources) await db.sources.bulkPut(data.sources);
                        if (data.items) await db.items.bulkAdd(data.items);
                        renderUI();
                        alert('匯入完成！');
                    }
                } catch (err) { alert('匯入失敗，請確認檔案格式是否正確。'); }
            };
            reader.readAsText(file);
        }

        db.open();
    </script>
</body>
