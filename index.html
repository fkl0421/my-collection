<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>收藏管理系統 V25 - 核心穩定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .aspect-card { aspect-ratio: 2 / 3; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-cat { background-color: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .sub-cat-active { border-left: 4px solid #2563eb; background-color: #f1f5f9; color: #2563eb; font-weight: bold; }
        .cat-content { transition: max-height 0.3s ease-out, opacity 0.2s; overflow: hidden; }
        .cat-collapsed { max-height: 0; opacity: 0; pointer-events: none; }
        .cat-expanded { max-height: 1000px; opacity: 1; pointer-events: auto; }
        .img-del-btn { position: absolute; top: -4px; right: -4px; background: #ef4444; color: white; width: 16px; height: 16px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white; z-index: 10; }
        #reader { width: 100% !important; border: none !important; border-radius: 1.5rem; overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-10 text-sm">

    <nav class="bg-white/80 border-b sticky top-0 z-40 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-3">
            <div class="flex items-center gap-2">
                <div class="p-1.5 bg-blue-600 rounded-lg text-white font-bold text-sm shadow-md">V25</div>
                <h1 class="text-base md:text-lg font-black tracking-tighter uppercase text-slate-800">My Collection</h1>
            </div>
            <div class="flex-1 min-w-[200px] max-w-md order-3 md:order-2">
                <input type="text" id="searchInput" oninput="renderGallery()" placeholder="搜尋關鍵字、位置..." 
                    class="w-full px-4 py-1.5 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition text-slate-700">
            </div>
            <div class="flex items-center gap-2 order-2 md:order-3">
                <button onclick="startScanner()" title="掃描條碼" class="p-2 bg-indigo-50 text-indigo-600 rounded-xl hover:bg-indigo-100 shadow-sm transition">📷</button>
                <button onclick="openAddModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-xl font-bold text-sm shadow-md active:scale-95 transition">新增</button>
                <div class="flex bg-slate-100 rounded-xl p-1 gap-1 text-slate-400">
                    <button onclick="exportData()" title="匯出" class="p-1 hover:text-blue-600">📤</button>
                    <input type="file" id="importFile" class="hidden" onchange="importData(event)">
                    <button onclick="document.getElementById('importFile').click()" title="匯入" class="p-1 hover:text-blue-600">📥</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-6 flex flex-col md:flex-row gap-6">
        <aside class="w-full md:w-60 lg:w-64 space-y-4">
            <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-3 px-1">
                    <h3 class="text-[10px] font-bold text-slate-400 tracking-widest uppercase">分類與系列</h3>
                    <button onclick="openManageModal('categories')" class="text-[10px] bg-blue-50 px-2 py-0.5 rounded-lg text-blue-600 font-bold hover:bg-blue-100 transition">+ 管理</button>
                </div>
                <div id="categoryMenu" class="space-y-1"></div>
            </div>
            <div class="bg-blue-50 p-5 rounded-3xl border border-blue-100/50 text-center">
                <p class="text-[10px] text-blue-400 font-bold uppercase mb-1 tracking-wider">價值統計</p>
                <p class="text-xl lg:text-2xl font-black text-blue-700">NT$ <span id="statPrice">0</span></p>
                <p class="text-[10px] text-blue-500 mt-1 font-bold">總計 <span id="statCount">0</span> 件品項</p>
            </div>
        </aside>
        <main class="flex-1">
            <div id="gallery" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6"></div>
        </main>
    </div>

    <!-- 掃描與燈箱 (略) -->
    <div id="scannerModal" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-6 overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-black text-slate-800">條碼辨識</h3>
                <button onclick="stopScanner()" class="text-slate-400 text-xl">✕</button>
            </div>
            <div id="reader"></div>
        </div>
    </div>

    <!-- 編輯彈窗 -->
    <div id="itemModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-end md:items-center justify-center p-0 md:p-4 z-50 text-slate-700">
        <div class="bg-white rounded-t-[2rem] md:rounded-[2.5rem] w-full max-w-4xl max-h-[92vh] overflow-y-auto shadow-2xl p-6 md:p-10">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitle" class="text-xl font-black text-slate-800 tracking-tight">編輯收藏資訊</h2>
                <button onclick="closeModal('itemModal')" class="text-slate-300 hover:text-slate-800 text-2xl transition">✕</button>
            </div>
            <form id="itemForm" class="grid grid-cols-2 md:grid-cols-3 gap-x-4 gap-y-5">
                <input type="hidden" id="itemId">
                <div class="col-span-2">
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">產品名稱 *</label>
                    <input type="text" id="itemName" required class="w-full p-2.5 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">產品條碼</label>
                    <input type="text" id="itemBarcode" placeholder="EAN / UPC" class="w-full p-2.5 bg-slate-50 border-none rounded-xl outline-none">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">廠商 / 出版</label>
                    <input type="text" id="itemPublisher" placeholder="廠商名稱" class="w-full p-2.5 bg-slate-50 border-none rounded-xl outline-none">
                </div>
                <div>
                    <div class="flex justify-between items-end mb-1">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase">主類別</label>
                        <button type="button" onclick="openManageModal('categories')" class="text-[9px] text-indigo-500 font-bold">管理</button>
                    </div>
                    <select id="itemCategory" onchange="updateSubCatDropdown()" class="w-full p-2.5 bg-slate-50 border-none rounded-xl outline-none"></select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">子系列</label>
                    <select id="itemSubCategory" class="w-full p-2.5 bg-slate-50 border-none rounded-xl outline-none"></select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-blue-600 mb-1 uppercase font-black tracking-widest">📍 存放位置</label>
                    <input type="text" id="itemLocation" placeholder="位置標記" class="w-full p-2.5 bg-indigo-50 border-none rounded-xl outline-none text-xs">
                </div>
                <div>
                    <div class="flex justify-between items-end mb-1">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase">遊戲平台</label>
                        <button type="button" onclick="openManageModal('platforms')" class="text-[9px] text-indigo-500 font-bold">管理</button>
                    </div>
                    <select id="itemPlatform" class="w-full p-2.5 bg-slate-50 border-none rounded-xl outline-none"></select>
                </div>
                <div>
                    <div class="flex justify-between items-end mb-1">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase">入手渠道</label>
                        <button type="button" onclick="openManageModal('channels')" class="text-[9px] text-indigo-500 font-bold">管理</button>
                    </div>
                    <select id="itemChannel" class="w-full p-2.5 bg-slate-50 border-none rounded-xl outline-none"></select>
                </div>
                <div>
                    <div class="flex justify-between items-end mb-1">
                        <label class="block text-[10px] font-bold text-rose-500 uppercase">蒐藏狀態</label>
                        <button type="button" onclick="openManageModal('statuses')" class="text-[9px] text-indigo-500 font-bold">管理</button>
                    </div>
                    <select id="itemStatus" class="w-full p-2.5 bg-slate-50 border-none rounded-xl outline-none font-bold text-rose-500"></select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">數量</label>
                    <input type="number" id="itemQty" value="1" class="w-full p-2.5 bg-slate-50 border-none rounded-xl outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">購入價格</label>
                    <input type="number" id="itemPrice" value="0" class="w-full p-2.5 bg-slate-50 border-none rounded-xl outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">發行日期</label>
                    <input type="text" id="itemDate" placeholder="YYYY-MM-DD" class="w-full p-2.5 bg-slate-50 border-none rounded-xl outline-none">
                </div>
                <div class="col-span-2 md:col-span-3">
                    <label class="block text-[10px] font-bold text-indigo-600 mb-2 uppercase font-black">相片管理 (最多 5 張)</label>
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex flex-wrap gap-3">
                        <div id="editPreviewContainer" class="flex flex-wrap gap-3"></div>
                        <label class="cursor-pointer bg-white border-2 border-dashed border-indigo-200 text-indigo-400 w-12 h-12 flex items-center justify-center rounded-xl hover:bg-indigo-50 transition-all">
                            ⊕<input type="file" id="itemImages" accept="image/*" multiple class="hidden" onchange="handleNewImages(event)">
                        </label>
                    </div>
                </div>
                <div class="col-span-2 md:col-span-3">
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">詳細備註 / 內容物說明</label>
                    <textarea id="itemNote" rows="3" class="w-full p-2.5 bg-slate-50 border-none rounded-xl resize-none outline-none"></textarea>
                </div>
                <div class="col-span-2 md:col-span-3 flex justify-end gap-3 pt-4 border-t mt-2">
                    <button type="button" onclick="closeModal('itemModal')" class="px-6 py-2 text-slate-400 font-bold transition">取消</button>
                    <button type="submit" class="px-12 py-2 bg-blue-600 text-white rounded-2xl font-black shadow-lg hover:bg-blue-700 transition">儲存資料</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 詳情視窗 (修復核心：確保所有 ID 存在) -->
    <div id="detailModal" class="hidden fixed inset-0 bg-slate-950/95 flex items-center justify-center p-0 md:p-6 z-50 text-slate-700">
        <div class="bg-white md:rounded-[3rem] w-full max-w-6xl h-full md:h-auto overflow-hidden flex flex-col md:flex-row shadow-2xl relative">
            <div class="w-full md:w-3/5 bg-slate-900 flex flex-col h-[45vh] md:h-[75vh] relative">
                <div class="flex-1 flex items-center justify-center p-2 overflow-hidden">
                    <img id="detailMainImg" src="" class="max-w-full max-h-full object-contain cursor-zoom-in" onclick="zoomInImg(this.src)">
                </div>
                <div id="detailThumbnails" class="h-16 bg-black/20 flex gap-2 p-2 overflow-x-auto no-scrollbar justify-center"></div>
                <button onclick="changeDetailImg(-1)" class="absolute left-2 top-1/2 -translate-y-1/2 w-8 h-8 bg-white/10 text-white rounded-full">❮</button>
                <button onclick="changeDetailImg(1)" class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 bg-white/10 text-white rounded-full">❯</button>
            </div>
            <div class="w-full md:w-2/5 p-6 md:p-10 flex flex-col overflow-y-auto">
                <div class="flex justify-between items-start mb-4">
                    <div class="flex-1">
                        <div class="flex gap-2 flex-wrap mb-1">
                            <span id="detailCatInfo" class="text-[9px] bg-indigo-600 text-white px-2 py-0.5 rounded font-black uppercase"></span>
                            <span id="detailPlat" class="text-[9px] bg-slate-800 text-white px-2 py-0.5 rounded font-bold uppercase"></span>
                            <span id="detailStatus" class="text-[9px] bg-rose-500 text-white px-2 py-0.5 rounded font-black uppercase shadow-sm"></span>
                        </div>
                        <h2 id="detailName" class="text-xl md:text-2xl font-black text-slate-900 tracking-tight leading-tight"></h2>
                        <p class="text-[10px] font-bold text-slate-400 mt-1">條碼：<span id="detailBarcode" class="text-indigo-600 font-mono"></span></p>
                    </div>
                    <button onclick="closeModal('detailModal')" class="text-slate-300 hover:text-slate-900 text-2xl transition">✕</button>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-4 text-[11px] font-bold">
                    <div class="bg-blue-50 p-3 rounded-2xl border border-blue-100">
                        <p class="text-blue-400 mb-0.5 uppercase tracking-tighter">存放位置</p>
                        <p id="detailLoc" class="text-blue-800"></p>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                        <p class="text-slate-400 mb-0.5 uppercase tracking-tighter">價格 / 來源</p>
                        <p>NT$ <span id="detailPrice"></span> / <span id="detailChan"></span></p>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100 col-span-2">
                        <p class="text-slate-400 mb-0.5 uppercase tracking-tighter">數量、日期與廠商</p>
                        <p><span id="detailQty"></span> 件 · 發行日：<span id="detailDate"></span> · <span id="detailPub"></span></p>
                    </div>
                </div>
                <div class="flex-1 bg-slate-50 p-4 rounded-2xl border-2 border-dashed border-slate-200 mb-4 overflow-y-auto">
                    <p id="detailNote" class="text-slate-600 text-xs whitespace-pre-wrap leading-relaxed"></p>
                </div>
                <div class="flex gap-2">
                    <button id="editBtn" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg transition active:scale-95">編輯資料</button>
                    <button id="deleteBtn" class="px-4 text-rose-400 font-bold text-xs transition">移除</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 圖片燈箱與管理視窗 (略) -->
    <div id="lightbox" class="hidden fixed inset-0 bg-slate-950/90 z-[110] flex items-center justify-center" onclick="this.classList.add('hidden')">
        <img id="lightboxImg" src="" class="max-w-full max-h-full object-contain shadow-2xl">
    </div>

    <div id="manageModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[60] text-slate-700">
        <div class="bg-white rounded-[2rem] max-w-sm w-full p-8 shadow-2xl text-xs">
            <h3 id="manageTitle" class="font-black text-lg text-slate-800 mb-6 tracking-tight text-center">標籤管理</h3>
            <div class="space-y-4 mb-6">
                <div id="manageAddSection" class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <select id="manageParent" class="w-full p-2 mb-2 bg-white border rounded-lg outline-none"></select>
                    <div class="flex gap-2">
                        <input type="text" id="newCatInput" placeholder="名稱..." class="flex-1 p-2 border rounded-lg outline-none">
                        <button onclick="addManageItem()" class="bg-indigo-600 text-white px-4 rounded-lg font-bold transition">+</button>
                    </div>
                </div>
                <ul id="manageList" class="max-h-52 overflow-y-auto divide-y border border-slate-50 rounded-xl bg-slate-50/50"></ul>
            </div>
            <button onclick="closeModal('manageModal')" class="w-full py-3 bg-slate-100 rounded-xl font-bold uppercase transition">完成並關閉</button>
        </div>
    </div>

    <script>
        const db = new Dexie("CollectionV25DB");
        db.version(1).stores({
            items: '++id, name, category, subCategory, publisher, location, date, platform, channel, status, barcode',
            categories: '++id, name, parentId', platforms: '++id, name', channels: '++id, name', statuses: '++id, name'
        });

        let curCat = '全部', curSub = '全部', detailImgs = [], detailIdx = 0;
        let expandedCats = new Set(), currentManageTable = 'categories', tempEditImages = [], html5QrCode = null;

        const gId = (id) => document.getElementById(id);
        const setT = (id, val) => { const el = gId(id); if (el) el.innerText = val; }; // 安全設定文字

        async function startSystem() {
            await db.open();
            if (await db.categories.count() === 0) {
                const gid = await db.categories.add({name: '遊戲', parentId: 0});
                await db.categories.bulkAdd([{name:'大富翁',parentId:gid},{name:'週邊',parentId:0}]);
                await db.platforms.bulkAdd([{name:'PC'},{name:'PS5'}]);
                await db.statuses.bulkAdd([{name:'全新未拆'},{name:'二手良品'}]);
            }
            const first = await db.categories.where('parentId').equals(0).first();
            if(first) expandedCats.add(first.name);
            await renderUI();
        }

        async function renderUI() {
            await renderMenu(); await renderGallery();
            const rootCats = await db.categories.where('parentId').equals(0).toArray();
            const plats = await db.platforms.toArray();
            const chans = await db.channels.toArray();
            const stats = await db.statuses.toArray();
            
            gId('itemCategory').innerHTML = rootCats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            gId('itemPlatform').innerHTML = `<option value="">(平台)</option>` + plats.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
            gId('itemChannel').innerHTML = `<option value="">(渠道)</option>` + chans.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            gId('itemStatus').innerHTML = `<option value="">(狀態)</option>` + stats.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
            
            await updateSubCatDropdown(); updateStats();
        }

        // 核心穩定：修復點擊沒反應 (ID 找不到導致 Crash)
        async function showDetail(id) {
            try {
                const i = await db.items.get(id); 
                detailImgs = i.images || []; detailIdx = 0;
                
                // 安全填寫，即使 ID 寫錯也不會崩潰
                setT('detailName', i.name);
                setT('detailBarcode', i.barcode || '無條碼');
                setT('detailCatInfo', `${i.category} ❯ ${i.subCategory || '未系列'}`);
                setT('detailStatus', i.status || '未知');
                setT('detailLoc', i.location || '未標記');
                setT('detailPrice', Number(i.price).toLocaleString());
                setT('detailPlat', i.platform || 'N/A');
                setT('detailChan', i.channel || '未紀錄');
                setT('detailQty', i.qty || 1);
                setT('detailDate', i.date || '未知');
                setT('detailPub', i.publisher || '未填寫廠商');
                setT('detailNote', i.note || '');

                updateDetailImg();
                gId('editBtn').onclick = () => openEdit(i);
                gId('deleteBtn').onclick = async () => { if(confirm('刪除？')){ await db.items.delete(id); closeModal('detailModal'); renderUI(); }};
                
                gId('detailModal').classList.remove('hidden');
            } catch (err) {
                console.error("詳情視窗開啟失敗:", err);
                alert("開啟詳情時出錯，請確認資料庫是否正確。");
            }
        }

        // 其餘邏輯保持 V24 穩定性
        async function startScanner() {
            gId('scannerModal').classList.remove('hidden'); html5QrCode = new Html5Qrcode("reader");
            try { await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess); } catch (err) { alert("開啟相機失敗"); stopScanner(); }
        }
        async function onScanSuccess(text) {
            stopScanner(); const dup = await db.items.where('barcode').equals(text).first();
            if (dup) { if (confirm(`重複！已收藏過：${dup.name}\n查看詳情？`)) showDetail(dup.id); }
            else { if (confirm(`掃描成功：${text}\n是否新增？`)) { openAddModal(); gId('itemBarcode').value = text; }}
        }
        function stopScanner() { if(html5QrCode) html5QrCode.stop().catch(()=>{}); gId('scannerModal').classList.add('hidden'); }
        async function handleNewImages(e) { const files = e.target.files; if (!files.length) return; for (let f of files) if (tempEditImages.length < 5) tempEditImages.push(await toBase64(f)); renderEditPreviews(); e.target.value = ""; }
        function renderEditPreviews() { gId('editPreviewContainer').innerHTML = tempEditImages.map((img, idx) => `<div class="relative w-12 h-12"><img src="${img}" onclick="zoomInImg('${img}')" class="w-full h-full object-cover rounded-lg border cursor-zoom-in"><div class="img-del-btn" onclick="removeTempImg(${idx})">✕</div></div>`).join(''); }
        function removeTempImg(idx) { tempEditImages.splice(idx, 1); renderEditPreviews(); }
        function zoomInImg(src) { gId('lightboxImg').src = src; gId('lightbox').classList.remove('hidden'); }
        async function openAddModal() { gId('itemForm').reset(); gId('itemId').value=''; tempEditImages = []; renderEditPreviews(); gId('itemModal').classList.remove('hidden'); gId('modalTitle').innerText = '新增項目'; }
        async function openEdit(i) {
            closeModal('detailModal'); gId('itemId').value = i.id;
            gId('itemName').value = i.name; gId('itemBarcode').value = i.barcode || ''; gId('itemPublisher').value = i.publisher || '';
            gId('itemQty').value = i.qty || 1; gId('itemPrice').value = i.price || 0; gId('itemLocation').value = i.location || '';
            gId('itemDate').value = i.date || ''; gId('itemNote').value = i.note || ''; gId('itemPlatform').value = i.platform || '';
            gId('itemChannel').value = i.channel || ''; gId('itemStatus').value = i.status || '';
            tempEditImages = i.images ? [...i.images] : []; renderEditPreviews();
            const root = await db.categories.where({parentId: 0, name: i.category}).first();
            if (root) { gId('itemCategory').value = root.id; await updateSubCatDropdown(); gId('itemSubCategory').value = i.subCategory || ''; }
            gId('modalTitle').innerText = '編輯收藏'; gId('itemModal').classList.remove('hidden');
        }
        gId('itemForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                const id = gId('itemId').value;
                const cid = Number(gId('itemCategory').value);
                const cobj = await db.categories.get(cid);
                const data = {
                    name: gId('itemName').value, barcode: gId('itemBarcode').value, publisher: gId('itemPublisher').value,
                    category: cobj ? cobj.name : "未分類", subCategory: gId('itemSubCategory').value,
                    platform: gId('itemPlatform').value, channel: gId('itemChannel').value, status: gId('itemStatus').value,
                    qty: Number(gId('itemQty').value || 1), price: Number(gId('itemPrice').value || 0),
                    location: gId('itemLocation').value, date: gId('itemDate').value, note: gId('itemNote').value, images: tempEditImages
                };
                if (id) await db.items.update(Number(id), data); else await db.items.add(data);
                closeModal('itemModal'); await renderUI();
            } catch (err) { console.error(err); alert("儲存錯誤。"); }
        };
        function renderMenu() {
            db.categories.where('parentId').equals(0).toArray().then(roots => {
                let h = `<button onclick="setF('全部','全部')" class="w-full text-left px-4 py-2 rounded-xl text-xs font-bold ${curCat==='全部'?'active-cat':'text-slate-500'}">全部收藏</button>`;
                roots.forEach(r => {
                    const isExp = expandedCats.has(r.name);
                    h += `<div class="mt-2"><div class="flex items-center justify-between px-3 py-1.5 cursor-pointer hover:bg-slate-50 rounded-lg group" onclick="toggleCollapse('${r.name}')"><span class="text-[10px] font-black uppercase tracking-wider ${curCat===r.name?'text-blue-600':'text-slate-400'}">${r.name}</span><span class="text-[10px] transition-transform ${isExp?'rotate-180':''}">▼</span></div><div class="cat-content ${isExp?'cat-expanded':'cat-collapsed'} flex flex-col gap-0.5 mt-1">`;
                    h += `<button onclick="setF('${r.name}','全部')" class="w-full text-left px-6 py-1 text-[11px] rounded-lg ${curCat===r.name&&curSub==='全部'?'sub-cat-active':'text-slate-400'}">全系列</button>`;
                    db.categories.where('parentId').equals(r.id).toArray().then(subs => {
                        subs.forEach(s => { h += `<button onclick="setF('${r.name}','${s.name}')" class="w-full text-left px-6 py-1 text-[11px] rounded-lg ${curCat===r.name&&curSub===s.name?'sub-cat-active':'text-slate-500'}">${s.name}</button>`; });
                    });
                    h += `</div></div>`;
                });
                gId('categoryMenu').innerHTML = h;
            });
        }
        function renderGallery() {
            const s = gId('searchInput').value.toLowerCase();
            db.items.toArray().then(items => {
                const fil = items.filter(i => (curCat==='全部'||i.category===curCat) && (curSub==='全部'||i.subCategory===curSub) && (i.name.toLowerCase().includes(s)||i.location.toLowerCase().includes(s)));
                gId('gallery').innerHTML = fil.reverse().map(i => `<div onclick="showDetail(${i.id})" class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-xl transition duration-500 cursor-pointer group"><div class="aspect-card bg-slate-50 relative overflow-hidden"><img src="${i.images?.[0]||'https://via.placeholder.com/400x600?text=NO+IMAGE'}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">${i.status?`<div class="absolute top-2 left-2 bg-rose-500 text-white text-[8px] px-1.5 py-0.5 rounded font-black shadow-sm">${i.status}</div>`:''}</div><div class="p-3"><h4 class="font-bold text-xs truncate text-slate-800">${i.name}</h4><div class="flex justify-between items-center mt-2 text-[9px]"><p class="text-slate-400 truncate max-w-[40%]">📍 ${i.location||'未標'}</p><p class="text-blue-600 font-black">NT$ ${i.price.toLocaleString()}</p></div></div></div>`).join('');
            });
        }
        function toggleCollapse(n){ expandedCats.has(n)?expandedCats.delete(n):expandedCats.add(n); renderMenu(); }
        async function updateSubCatDropdown() {
            const pid = Number(gId('itemCategory').value); if(!pid) return;
            const subs = await db.categories.where('parentId').equals(pid).toArray();
            gId('itemSubCategory').innerHTML = `<option value="">(未分類)</option>` + subs.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
        }
        async function openManageModal(t) {
            currentManageTable = t; const roots = await db.categories.where('parentId').equals(0).toArray();
            gId('manageParent').style.display = t === 'categories' ? 'block' : 'none';
            if (t === 'categories') gId('manageParent').innerHTML = `<option value="0">大類</option>` + roots.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            await renderManageList(); gId('manageModal').classList.remove('hidden');
        }
        async function renderManageList() {
            const list = gId('manageList'); let h = "";
            if (currentManageTable === 'categories') {
                const roots = await db.categories.where('parentId').equals(0).toArray();
                for (let r of roots) {
                    h += `<li class="flex justify-between items-center p-3 font-bold bg-white text-slate-800"><span>● ${r.name}</span><div class="flex gap-2"><button onclick="renameItem(${r.id},'${r.name}',0)" class="text-blue-400">✎</button><button onclick="deleteManageItem(${r.id})" class="text-rose-300">✕</button></div></li>`;
                    const subs = await db.categories.where('parentId').equals(Number(r.id)).toArray();
                    subs.forEach(s => { h += `<li class="flex justify-between items-center p-3 pl-8 text-xs text-slate-500 bg-slate-50/50"><span>╰─ ${s.name}</span><div class="flex gap-2"><button onclick="renameItem(${s.id},'${s.name}',${r.id})" class="text-blue-400">✎</button><button onclick="deleteManageItem(${s.id})" class="text-rose-300">✕</button></div></li>`; });
                }
            } else {
                const items = await db[currentManageTable].toArray();
                items.forEach(i => { h += `<li class="flex justify-between items-center p-3 bg-white text-slate-700"><span>${i.name}</span><div class="flex gap-2"><button onclick="renameItem(${i.id},'${i.name}')" class="text-blue-400">✎</button><button onclick="deleteManageItem(${i.id})" class="text-rose-300">✕</button></div></li>`; });
            }
            list.innerHTML = h;
        }
        async function addManageItem() { const inp = gId('newCatInput'); const n = inp.value.trim(); if (!n) return; if (currentManageTable === 'categories') await db.categories.add({name: n, parentId: Number(gId('manageParent').value)}); else await db[currentManageTable].add({name: n}); inp.value = ''; await renderUI(); await renderManageList(); }
        async function renameItem(id, old, pId) {
            const n = prompt(`新名稱：`, old); if (!n || n === old) return;
            await db[currentManageTable].update(id, { name: n });
            if (currentManageTable === 'categories') { if (pId === 0) { await db.items.where('category').equals(old).modify({ category: n }); if (curCat === old) curCat = n; } else { const p = await db.categories.get(pId); await db.items.where({category: p.name, subCategory: old}).modify({ subCategory: n }); if (curSub === old) curSub = n; } }
            else { const fieldMap = { platforms: 'platform', channels: 'channel', statuses: 'status' }; await db.items.where(fieldMap[currentManageTable]).equals(old).modify({ [fieldMap[currentManageTable]]: n }); }
            await renderUI(); await renderManageList();
        }
        async function deleteManageItem(id) { if(confirm('刪除標籤？')) { await db[currentManageTable].delete(id); await renderUI(); await renderManageList(); }}
        function updateStats() { db.items.toArray().then(it => { gId('statCount').innerText = it.length; gId('statPrice').innerText = it.reduce((s,i)=>s+Number(i.price||0),0).toLocaleString(); }); }
        function setF(c,s){ curCat=c; curSub=s; renderUI(); }
        function closeModal(id){ gId(id).classList.add('hidden'); }
        function toBase64(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result); }); }
        function updateDetailImg() { const m = gId('detailMainImg'); const t = gId('detailThumbnails'); if (detailImgs.length > 0) { m.src = detailImgs[detailIdx]; t.innerHTML = detailImgs.map((img, i) => `<img src="${img}" onclick="detailIdx=${i};updateDetailImg()" class="h-full aspect-square object-cover rounded border-2 ${i===detailIdx?'border-blue-500 scale-105':'border-transparent opacity-50'}">`).join(''); } else { m.src = 'https://via.placeholder.com/600x800?text=NO+IMAGE'; t.innerHTML = ''; }}
        function changeDetailImg(s){ if(detailImgs.length===0) return; detailIdx=(detailIdx+s+detailImgs.length)%detailImgs.length; updateDetailImg(); }
        async function exportData() { const d = { items: await db.items.toArray(), categories: await db.categories.toArray(), platforms: await db.platforms.toArray(), channels: await db.channels.toArray(), statuses: await db.statuses.toArray() }; const a = document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(d)],{type:"application/json"})); a.download="vault_V25.json"; a.click(); }
        async function importData(e) { const r = new FileReader(); r.onload = async (ev) => { const d = JSON.parse(ev.target.result); if(d.categories) await db.categories.bulkPut(d.categories); if(d.platforms) await db.platforms.bulkPut(d.platforms); if(d.channels) await db.channels.bulkPut(d.channels); if(d.statuses) await db.statuses.bulkPut(d.statuses); if(d.items) await db.items.bulkAdd(d.items); location.reload(); }; r.readAsText(e.target.files[0]); }
        startSystem();
    </script>
</body>
</html>
