<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>收藏管理系統 V23 - 條碼辨識版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .aspect-card { aspect-ratio: 2 / 3; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-cat { background-color: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .sub-cat-active { border-left: 4px solid #2563eb; background-color: #f1f5f9; color: #2563eb; font-weight: bold; }
        .cat-content { transition: max-height 0.3s ease-out, opacity 0.2s; overflow: hidden; }
        .cat-collapsed { max-height: 0; opacity: 0; pointer-events: none; }
        .cat-expanded { max-height: 1000px; opacity: 1; pointer-events: auto; }
        .img-del-btn { position: absolute; top: -4px; right: -4px; background: #ef4444; color: white; width: 16px; height: 16px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white; }
        /* 掃描器樣式 */
        #reader { width: 100% !important; border: none !important; border-radius: 1.5rem; overflow: hidden; }
        #reader__dashboard_section_csr button { background: #2563eb; color: white; padding: 8px 16px; border-radius: 8px; border: none; font-weight: bold; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-10 text-sm">

    <!-- 響應式導覽列 -->
    <nav class="bg-white/80 border-b sticky top-0 z-40 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-3">
            <div class="flex items-center gap-2">
                <div class="p-1.5 bg-blue-600 rounded-lg text-white font-bold text-sm shadow-md">V23</div>
                <h1 class="text-base md:text-lg font-black tracking-tighter uppercase text-slate-800">My Vault</h1>
            </div>
            
            <div class="flex-1 min-w-[200px] max-w-md order-3 md:order-2">
                <input type="text" id="searchInput" oninput="renderGallery()" placeholder="搜尋產品、平台、位置..." 
                    class="w-full px-4 py-1.5 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition text-slate-700">
            </div>

            <div class="flex items-center gap-2 order-2 md:order-3">
                <button onclick="startScanner()" title="掃描條碼" class="p-2 bg-indigo-50 text-indigo-600 rounded-xl hover:bg-indigo-100 transition shadow-sm">📷</button>
                <button onclick="openAddModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-xl font-bold text-sm shadow-md active:scale-95 transition">新增</button>
                <div class="flex bg-slate-100 rounded-xl p-1 gap-1 text-slate-400">
                    <button onclick="exportData()" title="匯出" class="p-1 hover:text-blue-600">📤</button>
                    <input type="file" id="importFile" class="hidden" onchange="importData(event)">
                    <button onclick="document.getElementById('importFile').click()" title="匯入" class="p-1 hover:text-blue-600">📥</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-6 flex flex-col md:flex-row gap-6">
        <!-- 側邊欄 -->
        <aside class="w-full md:w-60 lg:w-64 space-y-4">
            <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-3 px-1">
                    <h3 class="text-[10px] font-bold text-slate-400 tracking-widest uppercase">分類與系列</h3>
                    <button onclick="openManageModal('categories')" class="text-[10px] bg-blue-50 px-2 py-0.5 rounded-lg text-blue-600 font-bold">+ 管理</button>
                </div>
                <div id="categoryMenu" class="space-y-1"></div>
            </div>
            <div class="bg-blue-50 p-5 rounded-3xl border border-blue-100/50">
                <p class="text-[10px] text-blue-400 font-bold uppercase mb-1 tracking-wider">價值統計</p>
                <p class="text-xl lg:text-2xl font-black text-blue-700">NT$ <span id="statPrice">0</span></p>
                <p class="text-[10px] text-blue-500 mt-1 font-bold">總計 <span id="statCount">0</span> 件品項</p>
            </div>
        </aside>

        <main class="flex-1 text-slate-700">
            <div id="gallery" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6"></div>
        </main>
    </div>

    <!-- 掃描條碼燈箱 -->
    <div id="scannerModal" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-6 overflow-hidden">
            <div class="flex justify-between items-center mb-4 px-2">
                <h3 class="font-black text-slate-800">條碼辨識</h3>
                <button onclick="stopScanner()" class="text-slate-400 text-xl">✕</button>
            </div>
            <div id="reader"></div>
            <p class="text-center text-[10px] text-slate-400 mt-4">請將條碼置於相機框內進行掃描</p>
        </div>
    </div>

    <!-- 編輯/新增視窗 (新增條碼欄位) -->
    <div id="itemModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-end md:items-center justify-center p-0 md:p-4 z-50 text-slate-700">
        <div class="bg-white rounded-t-[2rem] md:rounded-[2.5rem] w-full max-w-4xl max-h-[92vh] overflow-y-auto shadow-2xl p-6 md:p-10">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitle" class="text-xl font-black text-slate-800 tracking-tight">編輯收藏資訊</h2>
                <button onclick="closeModal('itemModal')" class="text-slate-300 hover:text-slate-800 text-2xl">✕</button>
            </div>
            <form id="itemForm" class="grid grid-cols-2 md:grid-cols-3 gap-x-4 gap-y-5">
                <input type="hidden" id="itemId">
                <div class="col-span-2">
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">產品名稱 *</label>
                    <input type="text" id="itemName" required class="w-full p-2.5 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">產品條碼</label>
                    <input type="text" id="itemBarcode" placeholder="EAN / UPC" class="w-full p-2.5 bg-slate-50 border-none rounded-xl outline-none">
                </div>
                
                <div>
                    <div class="flex justify-between items-end mb-1">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase">主類別</label>
                        <button type="button" onclick="openManageModal('categories')" class="text-[9px] text-indigo-500 font-bold">管理</button>
                    </div>
                    <select id="itemCategory" onchange="updateSubCatDropdown()" class="w-full p-2.5 bg-slate-50 border-none rounded-xl outline-none"></select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">子系列</label>
                    <select id="itemSubCategory" class="w-full p-2.5 bg-slate-50 border-none rounded-xl outline-none"></select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-indigo-500 mb-1 uppercase font-black">📍 存放位置</label>
                    <input type="text" id="itemLocation" placeholder="位置標記" class="w-full p-2.5 bg-indigo-50/50 border border-indigo-100 rounded-xl outline-none">
                </div>

                <div>
                    <div class="flex justify-between items-end mb-1">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase">遊戲平台</label>
                        <button type="button" onclick="openManageModal('platforms')" class="text-[9px] text-indigo-500 font-bold">管理</button>
                    </div>
                    <select id="itemPlatform" class="w-full p-2.5 bg-slate-50 border-none rounded-xl outline-none"></select>
                </div>
                <div>
                    <div class="flex justify-between items-end mb-1">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase">蒐藏狀態</label>
                        <button type="button" onclick="openManageModal('statuses')" class="text-[9px] text-indigo-500 font-bold">管理</button>
                    </div>
                    <select id="itemStatus" class="w-full p-2.5 bg-slate-50 border-none rounded-xl outline-none font-bold text-indigo-600"></select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">數量 / 購入價</label>
                    <div class="flex gap-2">
                        <input type="number" id="itemQty" value="1" class="w-16 p-2.5 bg-slate-50 border-none rounded-xl">
                        <input type="number" id="itemPrice" value="0" class="flex-1 p-2.5 bg-slate-50 border-none rounded-xl">
                    </div>
                </div>

                <div class="col-span-2 md:col-span-3">
                    <label class="block text-[10px] font-bold text-blue-600 mb-2 uppercase font-black">相片管理 (最多 5 張，點縮圖可放大)</label>
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex flex-wrap gap-3">
                        <div id="editPreviewContainer" class="flex flex-wrap gap-3"></div>
                        <label class="cursor-pointer bg-white border-2 border-dashed border-indigo-200 text-indigo-400 w-12 h-12 flex items-center justify-center rounded-xl hover:bg-indigo-50 transition">
                            ⊕<input type="file" id="itemImages" accept="image/*" multiple class="hidden" onchange="handleNewImages(event)">
                        </label>
                    </div>
                </div>

                <div class="col-span-2 md:col-span-3">
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">詳細備註</label>
                    <textarea id="itemNote" rows="3" class="w-full p-2.5 bg-slate-50 border-none rounded-xl resize-none outline-none"></textarea>
                </div>
                <div class="col-span-2 md:col-span-3 flex justify-end gap-3 pt-4 border-t mt-2">
                    <button type="button" onclick="closeModal('itemModal')" class="px-6 py-2 text-slate-400 font-bold">取消</button>
                    <button type="submit" class="px-12 py-2 bg-blue-600 text-white rounded-2xl font-black shadow-lg transition">儲存資料</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 詳情視窗 (同前版) -->
    <div id="detailModal" class="hidden fixed inset-0 bg-slate-950/95 flex items-center justify-center p-0 md:p-6 z-50">
        <div class="bg-white md:rounded-[3rem] w-full max-w-6xl h-full md:h-auto overflow-hidden flex flex-col md:flex-row shadow-2xl relative">
            <div class="w-full md:w-3/5 bg-slate-900 flex flex-col h-[45vh] md:h-[75vh] relative">
                <div class="flex-1 flex items-center justify-center p-2 overflow-hidden">
                    <img id="detailMainImg" src="" class="max-w-full max-h-full object-contain cursor-zoom-in" onclick="zoomInImg(this.src)">
                </div>
                <div id="detailThumbnails" class="h-16 bg-black/20 flex gap-2 p-2 overflow-x-auto no-scrollbar justify-center"></div>
                <button onclick="changeDetailImg(-1)" class="absolute left-2 top-1/2 -translate-y-1/2 w-8 h-8 bg-white/10 text-white rounded-full">❮</button>
                <button onclick="changeDetailImg(1)" class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 bg-white/10 text-white rounded-full">❯</button>
            </div>
            <div class="w-full md:w-2/5 p-6 md:p-10 flex flex-col overflow-y-auto">
                <div class="flex justify-between items-start mb-4 text-slate-700">
                    <div class="flex-1">
                        <div class="flex gap-2 flex-wrap mb-1">
                            <span id="detailCatInfo" class="text-[9px] bg-indigo-600 text-white px-2 py-0.5 rounded font-black uppercase"></span>
                            <span id="detailStatusTag" class="text-[9px] bg-rose-500 text-white px-2 py-0.5 rounded font-black uppercase"></span>
                        </div>
                        <h2 id="detailName" class="text-xl md:text-2xl font-black text-slate-900 tracking-tight"></h2>
                        <p class="text-[10px] font-bold text-slate-400 mt-1">條碼：<span id="detailBarcode" class="text-indigo-600 font-mono"></span></p>
                    </div>
                    <button onclick="closeModal('detailModal')" class="text-slate-300 text-2xl">✕</button>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-4 text-[11px] font-bold">
                    <div class="bg-blue-50 p-3 rounded-2xl border border-blue-100">
                        <p class="text-blue-400 mb-0.5 uppercase">存放地點</p>
                        <p id="detailLoc" class="text-blue-800"></p>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                        <p class="text-slate-400 mb-0.5 uppercase">價格 / 平台</p>
                        <p>NT$ <span id="detailPrice"></span> / <span id="detailPlat"></span></p>
                    </div>
                </div>
                <div class="flex-1 bg-slate-50 p-4 rounded-2xl border-2 border-dashed border-slate-200 mb-4">
                    <p id="detailNote" class="text-slate-600 text-xs whitespace-pre-wrap"></p>
                </div>
                <div class="flex gap-2">
                    <button id="editBtn" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg transition">編輯</button>
                    <button id="deleteBtn" class="px-4 text-rose-400 font-bold text-xs">移除</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 圖片燈箱 -->
    <div id="lightbox" class="hidden fixed inset-0 bg-slate-950/90 z-[110] flex items-center justify-center" onclick="this.classList.add('hidden')">
        <img id="lightboxImg" src="" class="max-w-full max-h-full object-contain">
    </div>

    <!-- 管理視窗 -->
    <div id="manageModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[60]">
        <div class="bg-white rounded-[2rem] max-w-sm w-full p-8 shadow-2xl text-xs">
            <h3 id="manageTitle" class="font-black text-lg text-slate-800 mb-6">標籤管理</h3>
            <div class="space-y-4 mb-6">
                <div id="manageAddSection" class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <select id="manageParent" class="w-full p-2 mb-2 bg-white border rounded-lg outline-none"></select>
                    <div class="flex gap-2">
                        <input type="text" id="newCatInput" placeholder="名稱..." class="flex-1 p-2 border rounded-lg">
                        <button onclick="addManageItem()" class="bg-indigo-600 text-white px-4 rounded-lg">+</button>
                    </div>
                </div>
                <ul id="manageList" class="max-h-52 overflow-y-auto divide-y border border-slate-50 rounded-xl bg-slate-50/50"></ul>
            </div>
            <button onclick="closeModal('manageModal')" class="w-full py-3 bg-slate-100 rounded-xl font-bold transition">完成</button>
        </div>
    </div>

    <script>
        const db = new Dexie("CollectionV23DB");
        db.version(1).stores({
            items: '++id, name, category, subCategory, publisher, location, date, platform, channel, status, barcode',
            categories: '++id, name, parentId',
            platforms: '++id, name',
            channels: '++id, name',
            statuses: '++id, name'
        });

        let curCat = '全部', curSub = '全部', detailImgs = [], detailIdx = 0;
        let expandedCats = new Set(), currentManageTable = 'categories', tempEditImages = [];
        let html5QrCode = null;

        async function startSystem() {
            await db.open();
            if (await db.categories.count() === 0) {
                const gid = await db.categories.add({name: '遊戲', parentId: 0});
                await db.categories.bulkAdd([{name:'大富翁',parentId:gid},{name:'週邊',parentId:0},{name:'模型',parentId:0}]);
                await db.platforms.bulkAdd([{name:'PC'},{name:'PS5'},{name:'Switch'}]);
                await db.statuses.bulkAdd([{name:'全新未拆'},{name:'二手良品'}]);
            }
            const first = await db.categories.where('parentId').equals(0).first();
            if(first) expandedCats.add(first.name);
            await renderUI();
        }

        // --- 條碼掃描功能 ---
        async function startScanner() {
            document.getElementById('scannerModal').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 150 } };
            
            try {
                await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
            } catch (err) {
                alert("無法開啟相機，請確保網站具備 HTTPS 權限。");
                stopScanner();
            }
        }

        async function onScanSuccess(decodedText) {
            stopScanner();
            // 到資料庫查詢是否有相同條碼
            const duplicate = await db.items.where('barcode').equals(decodedText).first();
            
            if (duplicate) {
                if (confirm(`⚠️ 重複收藏提醒！\n您已經擁有此商品。\n名稱：${duplicate.name}\n位置：${duplicate.location}\n\n要查看詳細資料嗎？`)) {
                    showDetail(duplicate.id);
                }
            } else {
                if (confirm(`掃描成功：${decodedText}\n目前尚未收藏此商品，是否新增？`)) {
                    openAddModal();
                    document.getElementById('itemBarcode').value = decodedText;
                }
            }
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().catch(err => console.error(err));
            }
            document.getElementById('scannerModal').classList.add('hidden');
        }

        // --- UI 渲染邏輯 (同 V22 並新增條碼處理) ---
        async function renderUI() {
            await renderMenu(); await renderGallery();
            const rootCats = await db.categories.where('parentId').equals(0).toArray();
            const plats = await db.platforms.toArray();
            const stats = await db.statuses.toArray();
            document.getElementById('itemCategory').innerHTML = rootCats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            document.getElementById('itemPlatform').innerHTML = `<option value="">(未設定)</option>` + plats.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
            document.getElementById('itemStatus').innerHTML = `<option value="">(未設定)</option>` + stats.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
            await updateSubCatDropdown(); updateGlobalStats();
        }

        async function renderMenu() {
            const container = document.getElementById('categoryMenu');
            const roots = await db.categories.where('parentId').equals(0).toArray();
            const allItems = await db.items.toArray();
            let h = `<button onclick="setF('全部','全部')" class="w-full text-left px-4 py-2 rounded-xl text-xs font-bold transition ${curCat==='全部'?'active-cat':'text-slate-500'}">全部收藏</button>`;
            for (let r of roots) {
                const isExp = expandedCats.has(r.name);
                const subs = await db.categories.where('parentId').equals(Number(r.id)).toArray();
                const hasUncat = allItems.some(i => i.category === r.name && (!i.subCategory || i.subCategory === ""));
                h += `<div class="mt-2"><div class="flex items-center justify-between px-3 py-1.5 cursor-pointer hover:bg-slate-50 rounded-lg" onclick="toggleCollapse('${r.name}')">
                    <span class="text-[10px] font-black uppercase tracking-wider ${curCat === r.name ? 'text-blue-600' : 'text-slate-400'}">${r.name}</span>
                    <span class="text-[10px] transition-transform ${isExp ? 'rotate-180' : ''}">▼</span>
                    </div><div class="cat-content ${isExp ? 'cat-expanded' : 'cat-collapsed'} flex flex-col gap-0.5 mt-1">`;
                h += `<button onclick="setF('${r.name}','全部')" class="w-full text-left px-6 py-1 text-[11px] rounded-lg transition ${curCat === r.name && curSub === '全部' ? 'sub-cat-active' : 'text-slate-400'}">全系列</button>`;
                if (hasUncat) h += `<button onclick="setF('${r.name}','未分類')" class="w-full text-left px-6 py-1 text-[11px] rounded-lg transition ${curCat === r.name && curSub === '未分類' ? 'sub-cat-active' : 'text-slate-400'}">● 未分類</button>`;
                h += subs.map(s => `<button onclick="setF('${r.name}','${s.name}')" class="w-full text-left px-6 py-1 text-[11px] rounded-lg transition ${curCat === r.name && curSub === s.name ? 'sub-cat-active' : 'text-slate-500'}">${s.name}</button>`).join('');
                h += `</div></div>`;
            }
            container.innerHTML = h;
        }

        async function renderGallery() {
            const s = document.getElementById('searchInput').value.toLowerCase();
            const items = await db.items.toArray();
            const filtered = items.filter(i => {
                const mC = (curCat === '全部' || i.category === curCat);
                let mS = (curSub === '全部') ? true : (curSub === '未分類' ? (!i.subCategory || i.subCategory === "") : (i.subCategory === curSub));
                return mC && mS && (i.name.toLowerCase().includes(s) || (i.barcode && i.barcode.includes(s)) || (i.location && i.location.toLowerCase().includes(s)));
            });
            document.getElementById('gallery').innerHTML = filtered.reverse().map(i => `
                <div onclick="showDetail(${i.id})" class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-xl transition duration-500 cursor-pointer group">
                    <div class="aspect-card bg-slate-50 relative overflow-hidden">
                        <img src="${i.images?.[0] || 'https://via.placeholder.com/400x600?text=NO+IMAGE'}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                        ${i.status ? `<div class="absolute top-2 left-2 bg-rose-500 text-white text-[8px] px-1.5 py-0.5 rounded font-black shadow-sm">${i.status}</div>` : ''}
                    </div>
                    <div class="p-3">
                        <h4 class="font-bold text-xs truncate text-slate-800">${i.name}</h4>
                        <div class="flex justify-between items-center mt-2 text-[9px]">
                            <p class="text-slate-400 font-bold truncate max-w-[40%]">📍 ${i.location || '未標記'}</p>
                            <p class="text-blue-600 font-black">NT$ ${Number(i.price).toLocaleString()}</p>
                        </div>
                    </div>
                </div>`).join('');
        }

        async function showDetail(id) {
            const i = await db.items.get(id); detailImgs = i.images || []; detailIdx = 0;
            document.getElementById('detailName').innerText = i.name;
            document.getElementById('detailBarcode').innerText = i.barcode || '無條碼資料';
            document.getElementById('detailCatInfo').innerText = `${i.category} ❯ ${i.subCategory || '未分類'}`;
            document.getElementById('detailStatusTag').innerText = i.status || '狀態未填';
            document.getElementById('detailLoc').innerText = i.location || '未標註';
            document.getElementById('detailPrice').innerText = Number(i.price || 0).toLocaleString();
            document.getElementById('detailPlat').innerText = i.platform || 'N/A';
            document.getElementById('detailNote').innerText = i.note || '無內容紀錄...';
            updateDetailImg(); document.getElementById('editBtn').onclick = () => openEdit(i);
            document.getElementById('deleteBtn').onclick = async () => { if(confirm('移除此收藏？')){ await db.items.delete(id); closeModal('detailModal'); renderUI(); }};
            document.getElementById('detailModal').classList.remove('hidden');
        }

        // --- 相片管理 ---
        async function handleNewImages(e) {
            const files = e.target.files; if (files.length === 0) return;
            for (let f of files) { if (tempEditImages.length < 5) tempEditImages.push(await toBase64(f)); }
            renderEditPreviews(); e.target.value = "";
        }
        function renderEditPreviews() {
            document.getElementById('editPreviewContainer').innerHTML = tempEditImages.map((img, idx) => `<div class="relative w-12 h-12"><img src="${img}" onclick="zoomInImg('${img}')" class="w-full h-full object-cover rounded-lg border cursor-zoom-in"><div class="img-del-btn" onclick="removeTempImg(${idx})">✕</div></div>`).join('');
        }
        function removeTempImg(idx) { tempEditImages.splice(idx, 1); renderEditPreviews(); }
        function zoomInImg(src) { document.getElementById('lightboxImg').src = src; document.getElementById('lightbox').classList.remove('hidden'); }

        // --- 視窗開關 ---
        async function openAddModal() { 
            document.getElementById('itemForm').reset(); document.getElementById('itemId').value=''; 
            tempEditImages = []; renderEditPreviews(); document.getElementById('itemModal').classList.remove('hidden'); 
            document.getElementById('modalTitle').innerText = '新增收藏項目';
        }
        async function openEdit(i) {
            closeModal('detailModal'); const f = document.getElementById('itemForm'); document.getElementById('itemId').value = i.id;
            f.itemName.value = i.name; f.itemBarcode.value = i.barcode || ''; f.itemPublisher.value = i.publisher || '';
            f.itemQty.value = i.qty || 1; f.itemPrice.value = i.price || 0; f.itemLocation.value = i.location || '';
            f.itemDate.value = i.date || ''; f.itemNote.value = i.note || ''; f.itemPlatform.value = i.platform || '';
            f.itemStatus.value = i.status || ''; tempEditImages = i.images ? [...i.images] : []; renderEditPreviews();
            const root = await db.categories.where({parentId: 0, name: i.category}).first();
            if (root) { document.getElementById('itemCategory').value = root.id; await updateSubCatDropdown(); document.getElementById('itemSubCategory').value = i.subCategory || ''; }
            document.getElementById('modalTitle').innerText = '編輯收藏';
            document.getElementById('itemModal').classList.remove('hidden');
        }
        document.getElementById('itemForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                const id = document.getElementById('itemId').value;
                const cid = Number(document.getElementById('itemCategory').value);
                const cobj = await db.categories.get(cid);
                const data = {
                    name: document.getElementById('itemName').value, barcode: document.getElementById('itemBarcode').value,
                    category: cobj.name, subCategory: document.getElementById('itemSubCategory').value || "",
                    platform: document.getElementById('itemPlatform').value, status: document.getElementById('itemStatus').value,
                    qty: Number(document.getElementById('itemQty').value || 1), price: Number(document.getElementById('itemPrice').value || 0),
                    location: document.getElementById('itemLocation').value, date: document.getElementById('itemDate').value, note: document.getElementById('itemNote').value,
                    images: tempEditImages, publisher: document.getElementById('itemPublisher').value
                };
                if (id) await db.items.update(Number(id), data); else await db.items.add(data);
                closeModal('itemModal'); await renderUI();
            } catch (err) { alert(err.message); }
        };

        // --- 輔助函式 ---
        function toggleCollapse(n) { expandedCats.has(n) ? expandedCats.delete(n) : expandedCats.add(n); renderMenu(); }
        async function updateSubCatDropdown() {
            const pid = Number(document.getElementById('itemCategory').value); const select = document.getElementById('itemSubCategory'); if (!pid) return;
            const subs = await db.categories.where('parentId').equals(pid).toArray(); select.innerHTML = `<option value="">(未分類)</option>` + subs.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
        }
        async function openManageModal(table) {
            currentManageTable = table; const roots = await db.categories.where('parentId').equals(0).toArray();
            const pSel = document.getElementById('manageParent'); pSel.style.display = table === 'categories' ? 'block' : 'none';
            if (table === 'categories') pSel.innerHTML = `<option value="0">大類</option>` + roots.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            await renderManageList(); document.getElementById('manageModal').classList.remove('hidden');
        }
        async function renderManageList() {
            const list = document.getElementById('manageList'); let h = "";
            if (currentManageTable === 'categories') {
                const roots = await db.categories.where('parentId').equals(0).toArray();
                for (let r of roots) {
                    h += `<li class="flex justify-between items-center p-3 font-bold bg-white"><span>● ${r.name}</span><button onclick="deleteManageItem(${r.id})" class="text-rose-300">✕</button></li>`;
                    const subs = await db.categories.where('parentId').equals(Number(r.id)).toArray();
                    subs.forEach(s => { h += `<li class="flex justify-between items-center p-3 pl-8 text-xs text-slate-400"><span>╰─ ${s.name}</span><button onclick="deleteManageItem(${s.id})" class="text-rose-300">✕</button></li>`; });
                }
            } else {
                const items = await db[currentManageTable].toArray();
                items.forEach(i => { h += `<li class="flex justify-between items-center p-3 bg-white"><span>${i.name}</span><button onclick="deleteManageItem(${i.id})" class="text-rose-300">✕</button></li>`; });
            }
            list.innerHTML = h;
        }
        async function addManageItem() {
            const inp = document.getElementById('newCatInput'); const n = inp.value.trim(); if (!n) return;
            if (currentManageTable === 'categories') await db.categories.add({name: n, parentId: Number(document.getElementById('manageParent').value)});
            else await db[currentManageTable].add({name: n});
            inp.value = ''; await renderUI(); await renderManageList();
        }
        async function deleteManageItem(id) { if(confirm('確定刪除？')) { await db[currentManageTable].delete(id); await renderUI(); await renderManageList(); }}
        function updateGlobalStats() { db.items.toArray().then(it => { document.getElementById('statCount').innerText = it.length; document.getElementById('statPrice').innerText = it.reduce((s,i)=>s+Number(i.price||0),0).toLocaleString(); }); }
        function setF(c,s){ curCat=c; curSub=s; renderUI(); }
        function closeModal(id){ document.getElementById(id).classList.add('hidden'); }
        function toBase64(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result); }); }
        async function exportData() { 
            const d = { items: await db.items.toArray(), categories: await db.categories.toArray(), platforms: await db.platforms.toArray(), channels: await db.channels.toArray(), statuses: await db.statuses.toArray() };
            const b = new Blob([JSON.stringify(d)], {type:"application/json"}); const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download="vault_V23.json"; a.click(); 
        }
        async function importData(e) { 
            const r = new FileReader(); r.onload = async (ev) => { const d = JSON.parse(ev.target.result); 
            if(d.categories) await db.categories.bulkPut(d.categories); if(d.platforms) await db.platforms.bulkPut(d.platforms); if(d.statuses) await db.statuses.bulkPut(d.statuses); if(d.items) await db.items.bulkAdd(d.items); location.reload(); }; r.readAsText(e.target.files[0]); 
        }
        async function dangerReset() { if(confirm('永久清空？')){ await db.delete(); location.reload(); } }
        startSystem();
    </script>
</body>
</html>
