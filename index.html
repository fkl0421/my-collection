<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人收藏管理系統 V5 - 子分類與廠商版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        .aspect-card { aspect-ratio: 2 / 3; }
        .active-cat { background-color: #2563eb; color: white; }
        .sub-cat-active { border-left: 4px solid #2563eb; background-color: #f1f5f9; color: #2563eb; font-weight: bold; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-20">

    <nav class="bg-white border-b sticky top-0 z-40 backdrop-blur-md bg-white/90">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-2">
                <div class="p-2 bg-indigo-600 rounded-lg text-white font-bold">V5</div>
                <h1 class="text-lg font-black tracking-tight uppercase">My Vault</h1>
            </div>
            
            <div class="flex flex-1 w-full max-w-xl">
                <input type="text" id="searchInput" oninput="renderGallery()" placeholder="搜尋產品、系列、廠商、放置點..." 
                    class="w-full px-5 py-2 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500">
            </div>

            <div class="flex gap-2">
                <button onclick="openAddModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-xl font-bold transition">新增收藏</button>
                <button onclick="exportData()" class="p-2 text-slate-400 hover:text-indigo-600">📤</button>
                <input type="file" id="importFile" class="hidden" onchange="importData(event)">
                <button onclick="document.getElementById('importFile').click()" class="p-2 text-slate-400 hover:text-indigo-600">📥</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8 flex flex-col md:flex-row gap-8">
        <aside class="w-full md:w-64 space-y-6">
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-4 px-1">
                    <h3 class="text-xs font-bold text-slate-400 tracking-widest uppercase">系列與大類</h3>
                    <button onclick="openManageModal('categories')" class="text-[10px] text-indigo-600">+ 管理</button>
                </div>
                <div id="categoryMenu" class="space-y-1">
                    </div>
            </div>

            <div class="bg-indigo-50 p-5 rounded-3xl">
                <p class="text-[10px] text-indigo-400 font-bold uppercase mb-1">收藏總值</p>
                <p class="text-xl font-black text-indigo-700">NT$ <span id="statPrice">0</span></p>
                <p class="text-xs text-indigo-500 mt-1">共 <span id="statCount">0</span> 件品項</p>
            </div>
        </aside>

        <main class="flex-1">
            <div id="gallery" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
        </main>
    </div>

    <div id="itemModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2.5rem] max-w-4xl w-full max-h-[90vh] overflow-y-auto shadow-2xl p-8 md:p-12">
            <h2 id="modalTitle" class="text-2xl font-black mb-8">編輯收藏品資訊</h2>
            
            <form id="itemForm" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <input type="hidden" id="itemId">
                
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">產品名稱 *</label>
                    <input type="text" id="itemName" required class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">出版 / 代理商</label>
                    <input type="text" id="itemPublisher" placeholder="例如：漢堂、大宇" class="w-full p-3 bg-slate-50 border-none rounded-xl">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">主類別</label>
                    <select id="itemCategory" onchange="updateSubCatDropdown()" class="w-full p-3 bg-slate-50 border-none rounded-xl"></select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">子系列 (例如：大富翁)</label>
                    <select id="itemSubCategory" class="w-full p-3 bg-slate-50 border-none rounded-xl"></select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">數量</label>
                    <input type="number" id="itemQty" value="1" class="w-full p-3 bg-slate-50 border-none rounded-xl">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">購入價格</label>
                    <input type="number" id="itemPrice" value="0" class="w-full p-3 bg-slate-50 border-none rounded-xl">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">存放位置</label>
                    <input type="text" id="itemLocation" placeholder="如：A夾、1樓" class="w-full p-3 bg-slate-50 border-none rounded-xl">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">版權/發行日期</label>
                    <input type="text" id="itemDate" placeholder="YYYY-MM-DD" class="w-full p-3 bg-slate-50 border-none rounded-xl">
                </div>

                <div class="md:col-span-3">
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">上傳照片 (最多 5 張)</label>
                    <input type="file" id="itemImages" accept="image/*" multiple class="w-full text-sm text-slate-400">
                </div>

                <div class="md:col-span-3">
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">詳細備註 (內容物說明)</label>
                    <textarea id="itemNote" rows="3" class="w-full p-3 bg-slate-50 border-none rounded-xl resize-none"></textarea>
                </div>

                <div class="md:col-span-3 flex justify-end gap-3 pt-6 border-t mt-4">
                    <button type="button" onclick="closeModal('itemModal')" class="px-8 py-3 text-slate-400 font-bold">取消</button>
                    <button type="submit" class="px-12 py-3 bg-indigo-600 text-white rounded-2xl font-black shadow-lg">儲存收藏</button>
                </div>
            </form>
        </div>
    </div>

    <div id="detailModal" class="hidden fixed inset-0 bg-slate-950/95 flex items-center justify-center p-0 md:p-10 z-50">
        <div class="bg-white md:rounded-[3rem] w-full max-w-6xl h-full md:h-auto overflow-hidden flex flex-col md:flex-row">
            <div class="w-full md:w-3/5 bg-slate-900 flex flex-col h-[40vh] md:h-[75vh] relative">
                <img id="detailMainImg" src="" class="w-full h-full object-contain p-4 transition-all">
                <div id="detailThumbnails" class="absolute bottom-4 left-0 right-0 h-16 flex gap-2 justify-center px-4 overflow-x-auto no-scrollbar"></div>
                <button onclick="changeDetailImg(-1)" class="absolute left-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/20 text-white rounded-full">❮</button>
                <button onclick="changeDetailImg(1)" class="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/20 text-white rounded-full">❯</button>
            </div>
            
            <div class="w-full md:w-2/5 p-8 md:p-12 flex flex-col overflow-y-auto">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <div class="flex gap-2 items-center mb-1">
                            <span id="detailCat" class="text-[9px] bg-indigo-600 text-white px-2 py-0.5 rounded font-black"></span>
                            <span id="detailSub" class="text-[9px] bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded font-black"></span>
                        </div>
                        <h2 id="detailName" class="text-2xl font-black text-slate-900"></h2>
                        <p class="text-sm font-bold text-slate-400 mt-1">代理/廠商：<span id="detailPub" class="text-slate-600"></span></p>
                    </div>
                    <button onclick="closeModal('detailModal')" class="text-slate-300 text-2xl">✕</button>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="bg-slate-50 p-3 rounded-xl border">
                        <p class="text-[9px] text-slate-400 font-bold uppercase">放置位置</p>
                        <p id="detailLoc" class="text-xs font-bold text-slate-700"></p>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-xl border">
                        <p class="text-[9px] text-slate-400 font-bold uppercase">購入價 / 數量</p>
                        <p class="text-xs font-bold text-slate-700">NT$ <span id="detailPrice"></span> / <span id="detailQty"></span>件</p>
                    </div>
                </div>

                <div class="flex-1 bg-slate-50 p-6 rounded-2xl border-2 border-dashed border-slate-200">
                    <p class="text-[9px] text-slate-400 font-bold uppercase mb-2">詳細備註與內容物</p>
                    <p id="detailNote" class="text-xs text-slate-600 whitespace-pre-wrap leading-relaxed"></p>
                </div>

                <div class="mt-8 flex gap-2">
                    <button id="editBtn" class="flex-1 py-4 bg-indigo-600 text-white rounded-xl font-bold">編輯資料</button>
                    <button id="deleteBtn" class="px-4 text-rose-400 text-xs">移除</button>
                </div>
            </div>
        </div>
    </div>

    <div id="manageModal" class="hidden fixed inset-0 bg-slate-900/50 flex items-center justify-center p-4 z-[60]">
        <div class="bg-white rounded-[2rem] max-w-md w-full p-8">
            <h3 class="font-black text-lg mb-4">管理分類與系列</h3>
            <div class="space-y-4">
                <div class="p-4 bg-slate-50 rounded-xl">
                    <p class="text-xs font-bold mb-2">新增分類 / 系列</p>
                    <select id="manageParent" class="w-full p-2 mb-2 text-sm border rounded">
                        <option value="none">建立為大類 (如:遊戲)</option>
                    </select>
                    <div class="flex gap-2">
                        <input type="text" id="newCatInput" placeholder="輸入名稱..." class="flex-1 p-2 text-sm border rounded">
                        <button onclick="addCategory()" class="bg-indigo-600 text-white px-4 rounded">+</button>
                    </div>
                </div>
                <div id="manageList" class="max-h-60 overflow-y-auto border rounded-xl divide-y"></div>
            </div>
            <button onclick="closeModal('manageModal')" class="w-full mt-6 py-3 bg-slate-100 rounded-xl font-bold">完成</button>
        </div>
    </div>

    <script>
        const db = new Dexie("CollectionV5DB");
        db.version(5).stores({
            items: '++id, name, category, subCategory, publisher, location',
            categories: '++id, name, parentId' // parentId 為空則是大類
        });

        let currentCat = '全部';
        let currentSub = '全部';
        let detailImages = [];
        let detailIdx = 0;

        db.on("ready", async () => {
            if (await db.categories.count() === 0) {
                const gameId = await db.categories.add({name: '遊戲', parentId: null});
                await db.categories.bulkAdd([
                    {name: '大富翁', parentId: gameId},
                    {name: '軒轅劍', parentId: gameId},
                    {name: '仙劍奇俠傳', parentId: gameId},
                    {name: '漢堂系列', parentId: gameId},
                    {name: '週邊', parentId: null}
                ]);
            }
            renderUI();
        });

        async function renderUI() {
            renderMenu();
            renderGallery();
            updateStats();
            // 更新 Modal 內的下拉選單
            const cats = await db.categories.where({parentId: null}).toArray();
            const select = document.getElementById('itemCategory');
            const manageParent = document.getElementById('manageParent');
            select.innerHTML = cats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            manageParent.innerHTML = `<option value="none">建立為大類</option>` + cats.map(c => `<option value="${c.id}">子系列 ⮕ ${c.name}</option>`).join('');
            updateSubCatDropdown();
        }

        async function renderMenu() {
            const container = document.getElementById('categoryMenu');
            const cats = await db.categories.where({parentId: null}).toArray();
            
            let html = `<button onclick="setFilter('全部','全部')" class="w-full text-left px-4 py-2 rounded-xl text-xs font-bold ${currentCat==='全部'?'active-cat':'text-slate-500'}">全部收藏</button>`;
            
            for (let c of cats) {
                const subs = await db.categories.where({parentId: c.id}).toArray();
                const isCatActive = currentCat === c.name;
                html += `<div class="mt-2">
                    <button onclick="setFilter('${c.name}','全部')" class="w-full text-left px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest ${isCatActive && currentSub === '全部' ? 'active-cat' : 'text-slate-400'}">${c.name}</button>
                    <div class="ml-4 border-l-2 mt-1 space-y-1">
                        ${subs.map(s => `
                            <button onclick="setFilter('${c.name}','${s.name}')" class="w-full text-left px-4 py-1.5 text-[11px] ${currentSub === s.name ? 'sub-cat-active' : 'text-slate-500 hover:bg-slate-100'} rounded-r-lg transition">
                                ${s.name}
                            </button>
                        `).join('')}
                    </div>
                </div>`;
            }
            container.innerHTML = html;
        }

        async function updateSubCatDropdown() {
            const parentId = parseInt(document.getElementById('itemCategory').value);
            const subs = await db.categories.where({parentId: parentId}).toArray();
            const select = document.getElementById('itemSubCategory');
            select.innerHTML = `<option value="">(無子系列)</option>` + subs.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
        }

        async function renderGallery() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            let items = await db.items.toArray();
            
            const filtered = items.filter(i => {
                const matchCat = currentCat === '全部' || i.category === currentCat;
                const matchSub = currentSub === '全部' || i.subCategory === currentSub;
                const matchSearch = i.name.toLowerCase().includes(search) || 
                                   (i.publisher && i.publisher.toLowerCase().includes(search)) ||
                                   (i.location && i.location.toLowerCase().includes(search));
                return matchCat && matchSub && matchSearch;
            });

            const gallery = document.getElementById('gallery');
            gallery.innerHTML = filtered.reverse().map(item => `
                <div onclick="showDetail(${item.id})" class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-xl transition-all cursor-pointer group">
                    <div class="aspect-card bg-slate-50 relative overflow-hidden">
                        <img src="${item.images?.[0] || 'https://via.placeholder.com/400x600?text=NO+IMAGE'}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                        <div class="absolute top-2 left-2 flex gap-1">
                            <span class="text-[8px] bg-white/80 backdrop-blur px-1.5 py-0.5 rounded font-black text-indigo-600 shadow-sm">${item.subCategory || item.category}</span>
                        </div>
                    </div>
                    <div class="p-4">
                        <h4 class="font-black text-slate-800 truncate text-xs">${item.name}</h4>
                        <div class="flex justify-between items-center mt-2">
                            <p class="text-[9px] text-slate-400 font-bold uppercase">${item.publisher || '未知廠商'}</p>
                            <p class="text-[9px] text-indigo-500 font-black">NT$ ${item.price.toLocaleString()}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function updateStats() {
            const items = await db.items.toArray();
            const total = items.reduce((sum, i) => sum + Number(i.price || 0), 0);
            document.getElementById('statCount').innerText = items.length;
            document.getElementById('statPrice').innerText = total.toLocaleString();
        }

        // --- 核心邏輯 (新增/刪除/詳情) ---
        function openAddModal() {
            document.getElementById('itemForm').reset();
            document.getElementById('itemId').value = '';
            document.getElementById('modalTitle').innerText = '新增收藏項目';
            document.getElementById('itemModal').classList.remove('hidden');
        }

        document.getElementById('itemForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('itemId').value;
            const files = document.getElementById('itemImages').files;
            
            let images = [];
            for (let i = 0; i < Math.min(files.length, 5); i++) {
                images.push(await toBase64(files[i]));
            }

            const catId = parseInt(document.getElementById('itemCategory').value);
            const catObj = await db.categories.get(catId);

            const data = {
                name: document.getElementById('itemName').value,
                publisher: document.getElementById('itemPublisher').value,
                category: catObj.name,
                subCategory: document.getElementById('itemSubCategory').value,
                qty: document.getElementById('itemQty').value,
                price: Number(document.getElementById('itemPrice').value),
                location: document.getElementById('itemLocation').value,
                date: document.getElementById('itemDate').value,
                note: document.getElementById('itemNote').value
            };

            if (id) {
                const old = await db.items.get(Number(id));
                data.images = images.length > 0 ? images : old.images;
                await db.items.update(Number(id), data);
            } else {
                data.images = images;
                await db.items.add(data);
            }
            closeModal('itemModal');
            renderUI();
        };

        async function showDetail(id) {
            const item = await db.items.get(id);
            detailImages = item.images || [];
            detailIdx = 0;

            document.getElementById('detailName').innerText = item.name;
            document.getElementById('detailPub').innerText = item.publisher || '未紀錄';
            document.getElementById('detailCat').innerText = item.category;
            document.getElementById('detailSub').innerText = item.subCategory || '無系列';
            document.getElementById('detailLoc').innerText = item.location || '未標註';
            document.getElementById('detailQty').innerText = item.qty;
            document.getElementById('detailPrice').innerText = item.price.toLocaleString();
            document.getElementById('detailNote').innerText = item.note || '無詳細內容...';

            updateDetailImg();
            document.getElementById('editBtn').onclick = () => openEditItem(item);
            document.getElementById('deleteBtn').onclick = () => deleteItem(item.id);
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function updateDetailImg() {
            const main = document.getElementById('detailMainImg');
            const thumb = document.getElementById('detailThumbnails');
            if (detailImages.length > 0) {
                main.src = detailImages[detailIdx];
                thumb.innerHTML = detailImages.map((img, i) => `
                    <img src="${img}" onclick="setDetailIdx(${i})" class="h-full aspect-square object-cover rounded-lg border-2 ${i===detailIdx?'border-indigo-500':'border-transparent'}">
                `).join('');
            } else {
                main.src = 'https://via.placeholder.com/600x800?text=NO+IMAGE';
                thumb.innerHTML = '';
            }
        }

        function setDetailIdx(i) { detailIdx = i; updateDetailImg(); }
        function changeDetailImg(step) {
            if (detailImages.length === 0) return;
            detailIdx = (detailIdx + step + detailImages.length) % detailImages.length;
            updateDetailImg();
        }

        function openEditItem(item) {
            closeModal('detailModal');
            document.getElementById('itemId').value = item.id;
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemPublisher').value = item.publisher;
            document.getElementById('itemQty').value = item.qty;
            document.getElementById('itemPrice').value = item.price;
            document.getElementById('itemLocation').value = item.location;
            document.getElementById('itemDate').value = item.date;
            document.getElementById('itemNote').value = item.note;
            document.getElementById('itemModal').classList.remove('hidden');
        }

        // --- 管理分類邏輯 ---
        async function openManageModal() {
            const allCats = await db.categories.toArray();
            document.getElementById('manageList').innerHTML = allCats.map(c => `
                <div class="flex justify-between items-center p-3 text-xs">
                    <span>${c.parentId ? '╰─ ' : '● '}${c.name}</span>
                    <button onclick="deleteCat(${c.id})" class="text-rose-400">✕</button>
                </div>
            `).join('');
            document.getElementById('manageModal').classList.remove('hidden');
        }

        async function addCategory() {
            const parentVal = document.getElementById('manageParent').value;
            const name = document.getElementById('newCatInput').value.trim();
            if (name) {
                const parentId = parentVal === 'none' ? null : parseInt(parentVal);
                await db.categories.add({name, parentId});
                document.getElementById('newCatInput').value = '';
                renderUI(); openManageModal();
            }
        }

        async function deleteCat(id) {
            if (confirm('刪除分類不會刪除物品，但物品將失去關聯，確定嗎？')) {
                await db.categories.delete(id);
                renderUI(); openManageModal();
            }
        }

        // 輔助函式
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function setFilter(c, s) { currentCat = c; currentSub = s; renderUI(); }
        function toBase64(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
            });
        }

        async function exportData() {
            const data = {
                items: await db.items.toArray(),
                categories: await db.categories.toArray(),
                version: 5
            };
            const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `Collection_V5_Backup.json`;
            a.click();
        }

        async function importData(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = async (e) => {
                const data = JSON.parse(e.target.result);
                if (data.categories) await db.categories.bulkPut(data.categories);
                if (data.items) await db.items.bulkAdd(data.items);
                renderUI(); alert('匯入完成！');
            };
            reader.readAsText(file);
        }

        db.open();
    </script>
</body>
</html>
