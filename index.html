<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收藏管理系統 V21 - 圖片預覽回歸版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .aspect-card { aspect-ratio: 2 / 3; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-cat { background-color: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .sub-cat-active { border-left: 4px solid #2563eb; background-color: #f1f5f9; color: #2563eb; font-weight: bold; }
        .cat-content { transition: max-height 0.3s ease-out, opacity 0.2s; overflow: hidden; }
        .cat-collapsed { max-height: 0; opacity: 0; pointer-events: none; }
        .cat-expanded { max-height: 1000px; opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-10 text-sm">

    <!-- 導覽列 -->
    <nav class="bg-white/80 border-b sticky top-0 z-40 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-3">
            <div class="flex items-center gap-2">
                <div class="p-1.5 bg-indigo-600 rounded-lg text-white font-bold text-sm shadow-md">V21</div>
                <h1 class="text-base md:text-lg font-black tracking-tighter uppercase text-slate-800">My Collection</h1>
            </div>
            
            <div class="flex-1 min-w-[200px] max-w-md order-3 md:order-2">
                <input type="text" id="searchInput" oninput="renderGallery()" placeholder="搜尋產品、平台、位置..." 
                    class="w-full px-4 py-1.5 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition text-slate-700">
            </div>
            <div class="flex items-center gap-2 order-2 md:order-3">
                <button onclick="openAddModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-1.5 rounded-xl font-bold text-sm shadow-md active:scale-95 transition">新增</button>
                <div class="flex bg-slate-100 rounded-xl p-1 gap-1 text-slate-400">
                    <button onclick="exportData()" title="匯出" class="p-1 hover:text-blue-600">📤</button>
                    <input type="file" id="importFile" class="hidden" onchange="importData(event)">
                    <button onclick="document.getElementById('importFile').click()" title="匯入" class="p-1 hover:text-blue-600">📥</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-6 flex flex-col md:flex-row gap-6">
        <!-- 側邊欄 -->
        <aside class="w-full md:w-60 lg:w-64 space-y-4">
            <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-3 px-1">
                    <h3 class="text-[10px] font-bold text-slate-400 tracking-widest uppercase">分類與系列</h3>
                    <button onclick="openManageModal('categories')" class="text-[10px] bg-blue-50 px-2 py-0.5 rounded-lg text-blue-600 font-bold hover:bg-blue-100 transition">+ 管理</button>
                </div>
                <div id="categoryMenu" class="space-y-1"></div>
            </div>
            <div class="bg-blue-50 p-5 rounded-3xl border border-blue-100/50">
                <p class="text-[10px] text-blue-400 font-bold uppercase mb-1 tracking-wider">價值統計</p>
                <p class="text-xl lg:text-2xl font-black text-blue-700">NT$ <span id="statPrice">0</span></p>
                <p class="text-[10px] text-blue-500 mt-1 font-bold">總計 <span id="statCount">0</span> 件品項</p>
            </div>
        </aside>

        <main class="flex-1">
            <div id="gallery" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6"></div>
        </main>
    </div>

    <!-- 編輯/新增視窗 (整合縮圖預覽回歸) -->
    <div id="itemModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-end md:items-center justify-center p-0 md:p-4 z-50 text-slate-700">
        <div class="bg-white rounded-t-[2rem] md:rounded-[2.5rem] w-full max-w-4xl max-h-[92vh] overflow-y-auto shadow-2xl p-6 md:p-10">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitle" class="text-xl font-black text-slate-800 tracking-tight">編輯收藏資訊</h2>
                <button onclick="closeModal('itemModal')" class="text-slate-300 hover:text-slate-800 text-2xl transition">✕</button>
            </div>
            <form id="itemForm" class="grid grid-cols-2 md:grid-cols-3 gap-x-4 gap-y-5">
                <input type="hidden" id="itemId">
                <div class="col-span-2">
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">產品名稱 *</label>
                    <input type="text" id="itemName" required class="w-full p-2.5 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">出版商 / 廠商</label>
                    <input type="text" id="itemPublisher" placeholder="漢堂、大宇..." class="w-full p-2.5 bg-slate-50 border-none rounded-xl outline-none">
                </div>

                <!-- 分類管理 -->
                <div>
                    <div class="flex justify-between items-end mb-1">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase">主類別</label>
                        <button type="button" onclick="openManageModal('categories')" class="text-[9px] text-indigo-500 font-bold hover:underline">✎ 管理</button>
                    </div>
                    <select id="itemCategory" onchange="updateSubCatDropdown()" class="w-full p-2.5 bg-slate-50 border-none rounded-xl outline-none"></select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">子系列</label>
                    <select id="itemSubCategory" class="w-full p-2.5 bg-slate-50 border-none rounded-xl outline-none"></select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-indigo-500 mb-1 uppercase font-black">📍 存放位置</label>
                    <input type="text" id="itemLocation" placeholder="位置標記" class="w-full p-2.5 bg-indigo-50/50 border border-indigo-100 rounded-xl outline-none">
                </div>

                <!-- 平台與渠道管理 -->
                <div>
                    <div class="flex justify-between items-end mb-1">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase">遊戲平台</label>
                        <button type="button" onclick="openManageModal('platforms')" class="text-[9px] text-indigo-500 font-bold hover:underline">✎ 管理</button>
                    </div>
                    <select id="itemPlatform" class="w-full p-2.5 bg-slate-50 border-none rounded-xl outline-none"></select>
                </div>
                <div>
                    <div class="flex justify-between items-end mb-1">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase">入手渠道</label>
                        <button type="button" onclick="openManageModal('channels')" class="text-[9px] text-indigo-500 font-bold hover:underline">✎ 管理</button>
                    </div>
                    <select id="itemChannel" class="w-full p-2.5 bg-slate-50 border-none rounded-xl outline-none"></select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">數量</label>
                    <input type="number" id="itemQty" value="1" class="w-full p-2.5 bg-slate-50 border-none rounded-xl outline-none">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">購入價格</label>
                    <input type="number" id="itemPrice" value="0" class="w-full p-2.5 bg-slate-50 border-none rounded-xl outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">發行日期</label>
                    <input type="text" id="itemDate" placeholder="YYYY-MM-DD" class="w-full p-2.5 bg-slate-50 border-none rounded-xl outline-none">
                </div>
                
                <!-- V17 回歸：編輯時的縮圖預覽 -->
                <div class="col-span-2 md:col-span-1">
                    <label class="block text-[10px] font-bold text-blue-600 mb-1 uppercase font-black">上傳照片 (最多 5 張)</label>
                    <div class="flex gap-2 items-center bg-slate-50 p-2 rounded-xl border border-slate-100 min-h-[50px]">
                        <input type="file" id="itemImages" accept="image/*" multiple class="w-full text-[10px] text-slate-400">
                        <div id="editPreviewContainer" class="flex gap-1 shrink-0">
                            <!-- 縮圖將在這裡顯示 -->
                        </div>
                    </div>
                </div>

                <div class="col-span-2 md:col-span-3">
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">詳細備註 / 內容物說明</label>
                    <textarea id="itemNote" rows="3" class="w-full p-2.5 bg-slate-50 border-none rounded-xl resize-none outline-none"></textarea>
                </div>
                <div class="col-span-2 md:col-span-3 flex justify-end gap-3 pt-4 border-t mt-2">
                    <button type="button" onclick="closeModal('itemModal')" class="px-6 py-2 text-slate-400 font-bold transition">取消</button>
                    <button type="submit" class="px-12 py-2 bg-indigo-600 text-white rounded-2xl font-black shadow-lg hover:bg-indigo-700 transition">儲存資料</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 詳情查看視窗 (包含圖片輪播) -->
    <div id="detailModal" class="hidden fixed inset-0 bg-slate-950/95 flex items-center justify-center p-0 md:p-6 z-50">
        <div class="bg-white md:rounded-[3rem] w-full max-w-6xl h-full md:h-auto overflow-hidden flex flex-col md:flex-row shadow-2xl">
            <div class="w-full md:w-3/5 bg-slate-900 flex flex-col h-[45vh] md:h-[75vh] relative">
                <div class="flex-1 flex items-center justify-center p-2 overflow-hidden">
                    <img id="detailMainImg" src="" class="max-w-full max-h-full object-contain transition-all duration-300">
                </div>
                <div id="detailThumbnails" class="h-16 bg-black/20 flex gap-2 p-2 overflow-x-auto no-scrollbar justify-center"></div>
                <button onclick="changeDetailImg(-1)" class="absolute left-2 top-1/2 -translate-y-1/2 w-8 h-8 bg-white/10 text-white rounded-full">❮</button>
                <button onclick="changeDetailImg(1)" class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 bg-white/10 text-white rounded-full">❯</button>
            </div>
            <div class="w-full md:w-2/5 p-6 md:p-10 flex flex-col overflow-y-auto">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <div class="flex gap-2 flex-wrap mb-1 text-slate-700">
                            <span id="detailCatInfo" class="text-[9px] bg-indigo-600 text-white px-2 py-0.5 rounded font-black uppercase"></span>
                            <span id="detailPlatTag" class="text-[9px] bg-slate-800 text-white px-2 py-0.5 rounded font-bold uppercase"></span>
                        </div>
                        <h2 id="detailName" class="text-xl md:text-2xl font-black text-slate-900 leading-tight tracking-tight"></h2>
                        <p class="text-[10px] font-bold text-slate-400 mt-1">廠商：<span id="detailPub" class="text-slate-600"></span> · 來源：<span id="detailChan" class="text-indigo-500"></span></p>
                    </div>
                    <button onclick="closeModal('detailModal')" class="text-slate-300 hover:text-slate-900 text-2xl transition">✕</button>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-4 text-[11px] font-bold text-slate-700">
                    <div class="bg-blue-50 p-3 rounded-2xl border border-blue-100">
                        <p class="text-blue-400 mb-0.5 uppercase tracking-tighter">存放地點</p>
                        <p id="detailLoc" class="text-blue-800 font-black text-xs"></p>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                        <p class="text-slate-400 mb-0.5 uppercase tracking-tighter">購入價格</p>
                        <p>NT$ <span id="detailPrice"></span></p>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100 col-span-2">
                        <p class="text-slate-400 mb-0.5 uppercase tracking-tighter">數量與發行日期</p>
                        <p><span id="detailQty"></span> 件 · 發行日：<span id="detailDate"></span></p>
                    </div>
                </div>
                <div class="flex-1 bg-slate-50 p-4 rounded-2xl border-2 border-dashed border-slate-200">
                    <p id="detailNote" class="text-slate-600 text-xs whitespace-pre-wrap leading-relaxed"></p>
                </div>
                <div class="mt-8 flex gap-2">
                    <button id="editBtn" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-lg">編輯資料</button>
                    <button id="deleteBtn" class="px-4 text-rose-400 font-bold text-xs transition">移除</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 管理標籤視窗 -->
    <div id="manageModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[60]">
        <div class="bg-white rounded-[2rem] max-w-sm w-full p-8 shadow-2xl text-xs">
            <h3 id="manageTitle" class="font-black text-lg text-slate-800 mb-6 tracking-tight">標籤管理</h3>
            <div class="space-y-4 mb-6">
                <div id="manageAddSection" class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 mb-2 uppercase">新增項目</p>
                    <select id="manageParent" class="w-full p-2 mb-2 bg-white border rounded-lg outline-none"></select>
                    <div class="flex gap-2">
                        <input type="text" id="newCatInput" placeholder="名稱..." class="flex-1 p-2 border rounded-lg outline-none">
                        <button onclick="addManageItem()" class="bg-indigo-600 text-white px-4 rounded-lg font-bold transition">+</button>
                    </div>
                </div>
                <ul id="manageList" class="max-h-52 overflow-y-auto divide-y border border-slate-50 rounded-xl bg-slate-50/50"></ul>
            </div>
            <button onclick="closeModal('manageModal')" class="w-full py-3 bg-slate-100 rounded-xl font-bold uppercase tracking-widest transition">完成</button>
        </div>
    </div>

    <script>
        const db = new Dexie("CollectionV21DB");
        db.version(1).stores({
            items: '++id, name, category, subCategory, publisher, location, date, platform, channel',
            categories: '++id, name, parentId',
            platforms: '++id, name',
            channels: '++id, name'
        });

        let curCat = '全部', curSub = '全部', detailImgs = [], detailIdx = 0;
        let expandedCats = new Set();
        let currentManageTable = 'categories';

        async function startSystem() {
            await db.open();
            if (await db.categories.count() === 0) {
                const gid = await db.categories.add({name: '遊戲', parentId: 0});
                await db.categories.bulkAdd([
                    {name: '大富翁', parentId: Number(gid)}, {name: '軒轅劍', parentId: Number(gid)},
                    {name: '仙劍奇俠傳', parentId: Number(gid)}, {name: '週邊', parentId: 0}
                ]);
                await db.platforms.bulkAdd([{name:'PC'},{name:'PS5'},{name:'Switch'}]);
                await db.channels.bulkAdd([{name:'蝦皮購物'},{name:'實體店面'}]);
            }
            const first = await db.categories.where('parentId').equals(0).first();
            if(first) expandedCats.add(first.name);
            await renderUI();
        }

        async function renderUI() {
            await renderMenu(); 
            await renderGallery();
            const rootCats = await db.categories.where('parentId').equals(0).toArray();
            const plats = await db.platforms.toArray();
            const chans = await db.channels.toArray();
            
            document.getElementById('itemCategory').innerHTML = rootCats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            document.getElementById('itemPlatform').innerHTML = `<option value="">(未設定平台)</option>` + plats.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
            document.getElementById('itemChannel').innerHTML = `<option value="">(未設定渠道)</option>` + chans.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            
            await updateSubCatDropdown();
            updateStats();
        }

        async function renderMenu() {
            const container = document.getElementById('categoryMenu');
            const roots = await db.categories.where('parentId').equals(0).toArray();
            const allItems = await db.items.toArray();
            let h = `<button onclick="setF('全部','全部')" class="w-full text-left px-4 py-2 rounded-xl text-xs font-bold transition ${curCat==='全部'?'active-cat shadow-md':'text-slate-500'}">全部收藏</button>`;
            for (let r of roots) {
                const isExp = expandedCats.has(r.name);
                const subs = await db.categories.where('parentId').equals(Number(r.id)).toArray();
                const hasUncat = allItems.some(i => i.category === r.name && (!i.subCategory || i.subCategory === ""));
                h += `<div class="mt-2"><div class="flex items-center justify-between px-3 py-1.5 cursor-pointer hover:bg-slate-50 rounded-lg group" onclick="toggleCollapse('${r.name}')">
                    <span class="text-[10px] font-black uppercase tracking-wider ${curCat === r.name ? 'text-blue-600' : 'text-slate-400'}">${r.name}</span>
                    <span class="text-[10px] transition-transform ${isExp ? 'rotate-180' : ''}">▼</span>
                    </div><div class="cat-content ${isExp ? 'cat-expanded' : 'cat-collapsed'} flex flex-col gap-0.5 mt-1">`;
                h += `<button onclick="setF('${r.name}','全部')" class="w-full text-left px-6 py-1 text-[11px] rounded-lg transition ${curCat === r.name && curSub === '全部' ? 'sub-cat-active' : 'text-slate-400'}">全系列</button>`;
                if (hasUncat) h += `<button onclick="setF('${r.name}','未分類')" class="w-full text-left px-6 py-1 text-[11px] rounded-lg transition ${curCat === r.name && curSub === '未分類' ? 'sub-cat-active' : 'text-slate-400'}">● 未分類</button>`;
                h += subs.map(s => `<button onclick="setF('${r.name}','${s.name}')" class="w-full text-left px-6 py-1 text-[11px] rounded-lg transition ${curCat === r.name && curSub === s.name ? 'sub-cat-active' : 'text-slate-500'}">${s.name}</button>`).join('');
                h += `</div></div>`;
            }
            container.innerHTML = h;
        }

        function toggleCollapse(n) { expandedCats.has(n) ? expandedCats.delete(n) : expandedCats.add(n); renderMenu(); }

        async function renderGallery() {
            const s = document.getElementById('searchInput').value.toLowerCase();
            const items = await db.items.toArray();
            const filtered = items.filter(i => {
                const mC = (curCat === '全部' || i.category === curCat);
                let mS = (curSub === '全部') ? true : (curSub === '未分類' ? (!i.subCategory || i.subCategory === "") : (i.subCategory === curSub));
                const match = i.name.toLowerCase().includes(s) || (i.location && i.location.toLowerCase().includes(s)) || (i.platform && i.platform.toLowerCase().includes(s));
                return mC && mS && match;
            });
            document.getElementById('gallery').innerHTML = filtered.reverse().map(i => `
                <div onclick="showDetail(${i.id})" class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-xl transition duration-500 cursor-pointer group">
                    <div class="aspect-card bg-slate-50 relative overflow-hidden">
                        <img src="${i.images?.[0] || 'https://via.placeholder.com/400x600?text=NO+IMAGE'}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-2.5">
                            <p class="text-white text-[9px] font-bold">📍 ${i.location || '未標記'}</p>
                        </div>
                    </div>
                    <div class="p-3">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[8px] bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded font-black uppercase tracking-tighter">${i.subCategory || '一般'}</span>
                            <span class="text-[8px] bg-slate-800 text-white px-1.5 py-0.5 rounded font-bold">${i.platform || ''}</span>
                        </div>
                        <h4 class="font-bold text-xs truncate text-slate-800 mt-1">${i.name}</h4>
                        <div class="flex justify-between items-center mt-2 text-[9px]">
                            <p class="text-slate-400 font-bold truncate max-w-[40%]">${i.publisher || ''}</p>
                            <p class="text-blue-600 font-black">NT$ ${Number(i.price).toLocaleString()}</p>
                        </div>
                    </div>
                </div>`).join('');
        }

        async function openManageModal(table) {
            currentManageTable = table;
            const titles = { categories: '分類與標籤管理', platforms: '遊戲平台管理', channels: '入手渠道管理' };
            document.getElementById('manageTitle').innerText = titles[table];
            const pSel = document.getElementById('manageParent');
            if (table === 'categories') {
                pSel.style.display = 'block';
                const roots = await db.categories.where('parentId').equals(0).toArray();
                pSel.innerHTML = `<option value="0">建立為大類</option>` + roots.map(c => `<option value="${c.id}">系列 ⮕ ${c.name}</option>`).join('');
            } else { pSel.style.display = 'none'; }
            await renderManageList();
            document.getElementById('manageModal').classList.remove('hidden');
        }

        async function renderManageList() {
            const list = document.getElementById('manageList'); let h = "";
            if (currentManageTable === 'categories') {
                const roots = await db.categories.where('parentId').equals(0).toArray();
                for (let r of roots) {
                    h += `<li class="flex justify-between items-center p-3 font-bold border-b bg-white"><span>● ${r.name}</span><div class="flex gap-2"><button onclick="renameItem(${r.id},'${r.name}',0)" class="text-blue-400">✎</button><button onclick="deleteManageItem(${r.id})" class="text-rose-300">✕</button></div></li>`;
                    const subs = await db.categories.where('parentId').equals(Number(r.id)).toArray();
                    subs.forEach(s => { h += `<li class="flex justify-between items-center p-3 pl-8 text-xs font-medium text-slate-500 bg-slate-50/50"><span>╰── ${s.name}</span><div class="flex gap-2"><button onclick="renameItem(${s.id},'${s.name}',${r.id})" class="text-blue-400">✎</button><button onclick="deleteManageItem(${s.id})" class="text-rose-300">✕</button></div></li>`; });
                }
            } else {
                const items = await db[currentManageTable].toArray();
                items.forEach(i => { h += `<li class="flex justify-between items-center p-3 bg-white"><span>${i.name}</span><div class="flex gap-2"><button onclick="renameItem(${i.id},'${i.name}')" class="text-blue-400">✎</button><button onclick="deleteManageItem(${i.id})" class="text-rose-300">✕</button></div></li>`; });
            }
            list.innerHTML = h;
        }

        async function addManageItem() {
            const inp = document.getElementById('newCatInput'); const name = inp.value.trim(); if (!name) return;
            if (currentManageTable === 'categories') { const p = Number(document.getElementById('manageParent').value); await db.categories.add({name, parentId: p}); }
            else { await db[currentManageTable].add({name}); }
            inp.value = ''; await renderUI(); await renderManageList();
        }

        async function renameItem(id, old, pId) {
            const n = prompt(`新名稱：`, old); if (!n || n === old) return;
            await db[currentManageTable].update(id, { name: n });
            if (currentManageTable === 'categories') {
                if (pId === 0) { 
                    await db.items.where('category').equals(old).modify({ category: n }); if (curCat === old) curCat = n; 
                    if (expandedCats.has(old)) { expandedCats.delete(old); expandedCats.add(n); }
                } else { const p = await db.categories.get(pId); await db.items.where({category: p.name, subCategory: old}).modify({ subCategory: n }); if (curSub === old) curSub = n; }
            } else { 
                const field = (currentManageTable === 'platforms' ? 'platform' : 'channel');
                await db.items.where(field).equals(old).modify({ [field]: n }); 
            }
            await renderUI(); await renderManageList();
        }

        async function deleteManageItem(id) { if (confirm('確定刪除？')) { await db[currentManageTable].delete(id); await renderUI(); await renderManageList(); } }

        function clearImageField() { document.getElementById('itemImages').value = ""; document.getElementById('editPreviewContainer').innerHTML = ""; }

        async function openAddModal() { 
            document.getElementById('itemForm').reset(); document.getElementById('itemId').value=''; 
            clearImageField(); document.getElementById('itemModal').classList.remove('hidden'); 
            document.getElementById('modalTitle').innerText = '新增收藏項目';
        }

        // V21 修正核心：找回編輯時的圖片預覽縮圖
        async function openEdit(i) {
            closeModal('detailModal'); const f = document.getElementById('itemForm'); document.getElementById('itemId').value = i.id;
            f.itemName.value = i.name; f.itemPublisher.value = i.publisher || ''; f.itemQty.value = i.qty || 1; f.itemPrice.value = i.price || 0;
            f.itemLocation.value = i.location || ''; f.itemDate.value = i.date || ''; f.itemNote.value = i.note || ''; f.itemPlatform.value = i.platform || ''; f.itemChannel.value = i.channel || '';
            
            clearImageField(); 
            // 關鍵修復：這裡重新加上了 <img> 標籤的映射
            if (i.images && i.images.length > 0) {
                document.getElementById('editPreviewContainer').innerHTML = i.images.map(img => `<img src="${img}" class="h-8 w-8 object-cover rounded border border-slate-200">`).join('');
            }

            const root = await db.categories.where({parentId: 0, name: i.category}).first();
            if (root) { document.getElementById('itemCategory').value = root.id; await updateSubCatDropdown(); document.getElementById('itemSubCategory').value = i.subCategory || ''; }
            document.getElementById('modalTitle').innerText = '編輯收藏資訊';
            document.getElementById('itemModal').classList.remove('hidden');
        }

        document.getElementById('itemForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                const id = document.getElementById('itemId').value; const files = document.getElementById('itemImages').files;
                const cid = Number(document.getElementById('itemCategory').value); const cobj = await db.categories.get(cid);
                let imgs = []; if (files.length > 0) { for (let i = 0; i < Math.min(files.length, 5); i++) { imgs.push(await toBase64(files[i])); } }
                const data = {
                    name: document.getElementById('itemName').value, publisher: document.getElementById('itemPublisher').value,
                    category: cobj.name, subCategory: document.getElementById('itemSubCategory').value || "",
                    platform: document.getElementById('itemPlatform').value, channel: document.getElementById('itemChannel').value,
                    qty: Number(document.getElementById('itemQty').value || 1), price: Number(document.getElementById('itemPrice').value || 0),
                    location: document.getElementById('itemLocation').value, date: document.getElementById('itemDate').value, note: document.getElementById('itemNote').value
                };
                if (id) { const old = await db.items.get(Number(id)); data.images = imgs.length > 0 ? imgs : (old.images || []); await db.items.update(Number(id), data); }
                else { data.images = imgs; await db.items.add(data); }
                closeModal('itemModal'); await renderUI();
            } catch (err) { alert(err.message); }
        };

        async function showDetail(id) {
            const i = await db.items.get(id); detailImgs = i.images || []; detailIdx = 0;
            document.getElementById('detailName').innerText = i.name; document.getElementById('detailCatInfo').innerText = `${i.category} ❯ ${i.subCategory || '未分類'}`;
            document.getElementById('detailPlatTag').innerText = i.platform || 'N/A'; document.getElementById('detailLoc').innerText = i.location || '未標註';
            document.getElementById('detailPrice').innerText = Number(i.price || 0).toLocaleString(); document.getElementById('detailPub').innerText = i.publisher || '未填寫';
            document.getElementById('detailChan').innerText = i.channel || '未紀錄'; document.getElementById('detailQty').innerText = i.qty || 1;
            document.getElementById('detailDate').innerText = i.date || '未紀錄'; document.getElementById('detailNote').innerText = i.note || '無詳細說明...';
            updateDetailImg(); document.getElementById('editBtn').onclick = () => openEdit(i);
            document.getElementById('deleteBtn').onclick = async () => { if(confirm('移除？')){ await db.items.delete(id); closeModal('detailModal'); renderUI(); }};
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function updateDetailImg() {
            const m = document.getElementById('detailMainImg'); const t = document.getElementById('detailThumbnails');
            if (detailImgs.length > 0) {
                m.src = detailImgs[detailIdx];
                t.innerHTML = detailImgs.map((img, i) => `<img src="${img}" onclick="setIdx(${i})" class="h-full aspect-square object-cover rounded border-2 ${i===detailIdx?'border-blue-500 scale-105 shadow-sm':'border-transparent opacity-50'}">`).join('');
            } else { m.src = 'https://via.placeholder.com/600x800?text=NO+IMAGE'; t.innerHTML = ''; }
        }
        function setIdx(i){ detailIdx = i; updateDetailImg(); }
        function changeDetailImg(s){ if(detailImgs.length===0) return; detailIdx=(detailIdx+s+detailImgs.length)%detailImgs.length; updateDetailImg(); }
        
        async function updateSubCatDropdown() {
            const pid = Number(document.getElementById('itemCategory').value); const select = document.getElementById('itemSubCategory'); if (!pid) return;
            const subs = await db.categories.where('parentId').equals(pid).toArray(); select.innerHTML = `<option value="">(未分類)</option>` + subs.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
        }
        async function dangerReset() { if(confirm('⚠️ 警告：這將會清除所有內容並無法復原。')){ await db.delete(); location.reload(); } }
        function updateStats() { db.items.toArray().then(it => { document.getElementById('statCount').innerText = it.length; document.getElementById('statPrice').innerText = it.reduce((s,i)=>s+Number(i.price||0),0).toLocaleString(); }); }
        function setF(c,s){ curCat=c; curSub=s; renderUI(); }
        function closeModal(id){ document.getElementById(id).classList.add('hidden'); }
        function toBase64(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result); }); }
        
        async function exportData() { 
            const d = { items: await db.items.toArray(), categories: await db.categories.toArray(), platforms: await db.platforms.toArray(), channels: await db.channels.toArray() };
            const blob = new Blob([JSON.stringify(d)], {type:"application/json"}); const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download="vault_V21.json"; a.click(); 
        }
        async function importData(e) { 
            const r = new FileReader(); r.onload = async (ev) => { const d = JSON.parse(ev.target.result); 
            if(d.categories) await db.categories.bulkPut(d.categories); if(d.platforms) await db.platforms.bulkPut(d.platforms); if(d.channels) await db.channels.bulkPut(d.channels); if(d.items) await db.items.bulkAdd(d.items); location.reload(); }; r.readAsText(e.target.files[0]); 
        }
        startSystem();
    </script>
</body>
</html>
