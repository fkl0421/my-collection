<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收藏管理系統 V14 - 全功能修復版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        .aspect-card { aspect-ratio: 2 / 3; }
        .active-cat { background-color: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .sub-cat-active { border-left: 4px solid #2563eb; background-color: #f1f5f9; color: #2563eb; font-weight: bold; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-20">

    <nav class="bg-white border-b sticky top-0 z-40 backdrop-blur-md bg-white/90">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-2">
                <div class="p-2 bg-blue-600 rounded-xl text-white font-bold shadow-md">V14</div>
                <h1 class="text-lg font-black tracking-tight uppercase">My Collection</h1>
            </div>
            <div class="flex flex-1 w-full max-w-xl mx-2">
                <input type="text" id="searchInput" oninput="renderGallery()" placeholder="搜尋產品名稱、系列或位置..." 
                    class="w-full px-5 py-2 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div class="flex gap-2">
                <button onclick="openAddModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl font-bold shadow-lg transition active:scale-95">新增收藏</button>
                <button onclick="exportData()" title="匯出" class="p-2 text-slate-400 hover:text-blue-600 transition">📤</button>
                <input type="file" id="importFile" class="hidden" onchange="importData(event)">
                <button onclick="document.getElementById('importFile').click()" title="匯入" class="p-2 text-slate-400 hover:text-blue-600 transition">📥</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8 flex flex-col md:flex-row gap-8">
        <aside class="w-full md:w-64 space-y-6">
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-4 px-1">
                    <h3 class="text-xs font-bold text-slate-400 tracking-widest uppercase">分類清單</h3>
                    <button onclick="openManageModal()" class="text-[10px] bg-blue-50 px-2 py-1 rounded-lg text-blue-600 font-bold hover:bg-blue-100 transition">+ 管理</button>
                </div>
                <div id="categoryMenu" class="space-y-1"></div>
            </div>
            <div class="bg-blue-50 p-6 rounded-3xl border border-blue-100/50">
                <p class="text-[10px] text-blue-400 font-bold uppercase mb-1">統計資訊</p>
                <p class="text-2xl font-black text-blue-700">NT$ <span id="statPrice">0</span></p>
                <p class="text-xs text-blue-500 mt-1">目前共 <span id="statCount">0</span> 件收藏</p>
            </div>
        </aside>
        <main class="flex-1">
            <div id="gallery" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
        </main>
    </div>

    <!-- 新增 / 編輯彈窗 -->
    <div id="itemModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2.5rem] max-w-4xl w-full max-h-[90vh] overflow-y-auto shadow-2xl p-8 md:p-12">
            <h2 id="modalTitle" class="text-2xl font-black mb-8 text-slate-800 tracking-tight">編輯收藏項目</h2>
            <form id="itemForm" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <input type="hidden" id="itemId">
                
                <div class="md:col-span-2">
                    <label class="block text-[10px] font-bold text-slate-400 mb-1">產品名稱 *</label>
                    <input type="text" id="itemName" required class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1">廠商 / 出版</label>
                    <input type="text" id="itemPublisher" placeholder="漢堂、大宇..." class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1">主類別 (大類)</label>
                    <select id="itemCategory" onchange="updateSubCatDropdown()" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none"></select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1">子系列 (標籤)</label>
                    <select id="itemSubCategory" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none"></select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-indigo-600 mb-1 uppercase font-bold tracking-widest">📍 存放地點</label>
                    <input type="text" id="itemLocation" placeholder="位置標記" class="w-full p-3 bg-indigo-50 border-none rounded-xl outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">數量</label>
                    <input type="number" id="itemQty" value="1" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">購入價格 (TWD)</label>
                    <input type="number" id="itemPrice" value="0" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">發行 / 版權日期</label>
                    <input type="text" id="itemDate" placeholder="YYYY-MM-DD" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none">
                </div>
                <div class="md:col-span-3">
                    <label class="block text-[10px] font-bold text-blue-600 mb-1 font-black">照片上傳 (最多 5 張)</label>
                    <input type="file" id="itemImages" accept="image/*" multiple class="w-full text-xs text-slate-400 bg-slate-50 p-2 rounded-xl">
                </div>
                <div class="md:col-span-3">
                    <label class="block text-[10px] font-bold text-slate-400 mb-1">備註 / 內容物說明</label>
                    <textarea id="itemNote" rows="3" class="w-full p-3 bg-slate-50 border-none rounded-xl resize-none outline-none"></textarea>
                </div>
                <div class="md:col-span-3 flex justify-end gap-3 pt-6 border-t mt-4">
                    <button type="button" onclick="closeModal('itemModal')" class="px-8 py-3 text-slate-400 font-bold hover:text-slate-600">取消</button>
                    <button type="submit" class="px-12 py-3 bg-blue-600 text-white rounded-2xl font-black shadow-lg hover:bg-blue-700 transition-all">儲存收藏</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 詳情查看視窗 -->
    <div id="detailModal" class="hidden fixed inset-0 bg-slate-950/95 flex items-center justify-center p-0 md:p-10 z-50">
        <div class="bg-white md:rounded-[3rem] w-full max-w-6xl h-full md:h-auto overflow-hidden flex flex-col md:flex-row shadow-2xl">
            <div class="w-full md:w-3/5 bg-slate-900 flex flex-col h-[45vh] md:h-[75vh] relative">
                <div class="flex-1 flex items-center justify-center p-4">
                    <img id="detailMainImg" src="" class="max-w-full max-h-full object-contain transition-all">
                </div>
                <div id="detailThumbnails" class="h-20 bg-black/30 flex gap-2 p-3 overflow-x-auto no-scrollbar justify-center"></div>
                <button onclick="changeDetailImg(-1)" class="absolute left-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/10 text-white rounded-full hover:bg-white/40">❮</button>
                <button onclick="changeDetailImg(1)" class="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/10 text-white rounded-full hover:bg-white/40">❯</button>
            </div>
            <div class="w-full md:w-2/5 p-8 md:p-12 flex flex-col overflow-y-auto">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <span id="detailCatInfo" class="text-[9px] bg-blue-600 text-white px-2 py-1 rounded font-black uppercase"></span>
                        <h2 id="detailName" class="text-2xl font-black text-slate-900 mt-2 leading-tight"></h2>
                    </div>
                    <button onclick="closeModal('detailModal')" class="text-slate-300 text-3xl">✕</button>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-8 text-xs font-bold">
                    <div class="bg-blue-50 p-3 rounded-xl border border-blue-100">
                        <p class="text-blue-400 mb-1 uppercase tracking-widest">存放地點</p>
                        <p id="detailLoc" class="text-blue-800 font-black"></p>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <p class="text-slate-400 mb-1 uppercase">價格 / 廠商</p>
                        <p>NT$ <span id="detailPrice"></span> / <span id="detailPub"></span></p>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 col-span-2">
                        <p class="text-slate-400 mb-1 uppercase">數量與日期</p>
                        <p><span id="detailQty"></span> 件 · 發行日: <span id="detailDate"></span></p>
                    </div>
                </div>
                <div class="flex-1 bg-slate-50 p-6 rounded-2xl border-2 border-dashed border-slate-200">
                    <p id="detailNote" class="text-slate-600 text-sm whitespace-pre-wrap leading-relaxed"></p>
                </div>
                <div class="mt-8 flex gap-3">
                    <button id="editBtn" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg hover:bg-blue-700 transition">編輯資料</button>
                    <button id="deleteBtn" class="px-6 py-4 text-rose-400 font-bold hover:text-rose-600 transition">移除</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 管理分類彈窗 -->
    <div id="manageModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[60]">
        <div class="bg-white rounded-[2.5rem] max-w-sm w-full p-8 shadow-2xl">
            <h3 class="font-black text-lg text-slate-800 mb-6">類別標籤管理</h3>
            <div class="space-y-4 mb-6 text-xs">
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 mb-2 uppercase">新增類別</p>
                    <select id="manageParent" class="w-full p-2 mb-2 bg-white border rounded-lg outline-none"></select>
                    <div class="flex gap-2">
                        <input type="text" id="newCatInput" placeholder="標籤名稱..." class="flex-1 p-2 border rounded-lg outline-none">
                        <button onclick="addCategory()" class="bg-blue-600 text-white px-4 rounded-lg font-bold hover:bg-blue-700 transition-all">+</button>
                    </div>
                </div>
                <ul id="manageList" class="max-h-52 overflow-y-auto divide-y border border-slate-50 rounded-xl bg-slate-50/50"></ul>
            </div>
            <div class="space-y-2">
                <button onclick="closeModal('manageModal')" class="w-full py-3 bg-slate-100 rounded-xl font-bold hover:bg-slate-200 transition-all">完成</button>
                <button onclick="dangerReset()" class="w-full py-2 text-[10px] text-rose-300 font-bold hover:text-rose-500">⚠️ 重設資料庫</button>
            </div>
        </div>
    </div>

    <script>
        const db = new Dexie("CollectionV14DB");
        db.version(1).stores({
            items: '++id, name, category, subCategory, publisher, location, date',
            categories: '++id, name, parentId' 
        });

        let curCat = '全部', curSub = '全部', detailImgs = [], detailIdx = 0;

        async function startSystem() {
            await db.open();
            if (await db.categories.count() === 0) {
                const gid = await db.categories.add({name: '遊戲', parentId: 0});
                await db.categories.bulkAdd([
                    {name: '大富翁', parentId: Number(gid)}, 
                    {name: '軒轅劍', parentId: Number(gid)},
                    {name: '仙劍奇俠傳', parentId: Number(gid)}, 
                    {name: '漢堂系列', parentId: Number(gid)},
                    {name: '週邊', parentId: 0},
                    {name: '模型', parentId: 0}
                ]);
            }
            await renderUI();
        }

        async function renderUI() {
            await renderMenu(); 
            await renderGallery();
            const rootCats = await db.categories.where('parentId').equals(0).toArray();
            const select = document.getElementById('itemCategory');
            const manageParent = document.getElementById('manageParent');
            select.innerHTML = rootCats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            manageParent.innerHTML = `<option value="0">建立為大類 (根節點)</option>` + 
                                     rootCats.map(c => `<option value="${c.id}">子系列 ⮕ ${c.name}</option>`).join('');
            await updateSubCatDropdown();
            updateStats();
        }

        async function renderMenu() {
            const container = document.getElementById('categoryMenu');
            const roots = await db.categories.where('parentId').equals(0).toArray();
            const allItems = await db.items.toArray();
            let h = `<button onclick="setF('全部','全部')" class="w-full text-left px-4 py-2 rounded-xl text-xs font-bold transition ${curCat==='全部'?'active-cat':'text-slate-500'}">全部收藏</button>`;
            for (let r of roots) {
                const subs = await db.categories.where('parentId').equals(Number(r.id)).toArray();
                h += `<div class="mt-3"><button onclick="setF('${r.name}','全部')" class="w-full text-left px-4 py-1 text-[10px] font-black uppercase tracking-widest ${curCat === r.name && curSub === '全部' ? 'text-blue-600' : 'text-slate-400'}">${r.name}</button>`;
                if (allItems.some(i => i.category === r.name && (!i.subCategory || i.subCategory === ""))) {
                    h += `<button onclick="setF('${r.name}','未分類')" class="w-full text-left px-6 py-1 text-[11px] ${curCat === r.name && curSub === '未分類' ? 'sub-cat-active' : 'text-slate-400'}">● 未分類</button>`;
                }
                h += subs.map(s=>`<button onclick="setF('${r.name}','${s.name}')" class="w-full text-left px-6 py-1 text-[11px] rounded-r-xl transition ${curCat === r.name && curSub === s.name ? 'sub-cat-active' : 'text-slate-500 hover:bg-slate-100'}">${s.name}</button>`).join('');
                h += `</div>`;
            }
            container.innerHTML = h;
        }

        async function renderGallery() {
            const s = document.getElementById('searchInput').value.toLowerCase();
            const items = await db.items.toArray();
            const filtered = items.filter(i => {
                const matchCat = (curCat === '全部' || i.category === curCat);
                let matchSub = (curSub === '全部') ? true : (curSub === '未分類' ? (!i.subCategory || i.subCategory === "") : (i.subCategory === curSub));
                return matchCat && matchSub && (i.name.toLowerCase().includes(s) || (i.location && i.location.toLowerCase().includes(s)));
            });
            document.getElementById('gallery').innerHTML = filtered.reverse().map(i => `
                <div onclick="showDetail(${i.id})" class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-xl transition duration-500 cursor-pointer group">
                    <div class="aspect-card bg-slate-50 relative overflow-hidden">
                        <img src="${i.images?.[0] || 'https://via.placeholder.com/300x450?text=NO+IMAGE'}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                    </div>
                    <div class="p-4">
                        <span class="text-[8px] bg-blue-50 text-blue-600 px-2 py-0.5 rounded font-black uppercase tracking-tighter">${i.subCategory || '未分類'}</span>
                        <h4 class="font-black text-xs truncate mt-1 text-slate-800">${i.name}</h4>
                        <div class="flex justify-between items-center mt-2">
                            <p class="text-[9px] text-slate-400 font-bold truncate">📍 ${i.location || '未標註'}</p>
                            <p class="text-[10px] text-blue-600 font-black">NT$ ${Number(i.price).toLocaleString()}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('itemForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                const id = document.getElementById('itemId').value;
                const files = document.getElementById('itemImages').files;
                const cid = Number(document.getElementById('itemCategory').value);
                const cobj = await db.categories.get(cid);
                if (!cobj) throw new Error("找不到主類別資料。");

                let images = [];
                for (let i = 0; i < Math.min(files.length, 5); i++) { images.push(await toBase64(files[i])); }

                const data = {
                    name: document.getElementById('itemName').value,
                    publisher: document.getElementById('itemPublisher').value,
                    category: cobj.name,
                    subCategory: document.getElementById('itemSubCategory').value || "",
                    qty: Number(document.getElementById('itemQty').value || 1),
                    price: Number(document.getElementById('itemPrice').value || 0),
                    location: document.getElementById('itemLocation').value,
                    date: document.getElementById('itemDate').value,
                    note: document.getElementById('itemNote').value
                };

                if (id) {
                    const old = await db.items.get(Number(id));
                    data.images = images.length > 0 ? images : (old.images || []);
                    await db.items.update(Number(id), data);
                } else {
                    data.images = images; await db.items.add(data);
                }
                closeModal('itemModal'); await renderUI();
            } catch (err) { alert("儲存失敗：" + err.message); }
        };

        // --- 輔助函式 ---
        async function updateSubCatDropdown() {
            const pid = Number(document.getElementById('itemCategory').value);
            const select = document.getElementById('itemSubCategory');
            if (!pid) { select.innerHTML = `<option value="">(無)</option>`; return; }
            const subs = await db.categories.where('parentId').equals(pid).toArray();
            select.innerHTML = `<option value="">(無系列/未分類)</option>` + subs.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
        }

        async function showDetail(id) {
            const i = await db.items.get(id);
            detailImgs = i.images || []; detailIdx = 0;
            document.getElementById('detailName').innerText = i.name;
            document.getElementById('detailCatInfo').innerText = `${i.category} ❯ ${i.subCategory || '未分類'}`;
            document.getElementById('detailLoc').innerText = i.location || '未標註';
            document.getElementById('detailPrice').innerText = Number(i.price || 0).toLocaleString();
            document.getElementById('detailPub').innerText = i.publisher || '未填寫';
            document.getElementById('detailQty').innerText = i.qty || 1;
            document.getElementById('detailDate').innerText = i.date || '未紀錄';
            document.getElementById('detailNote').innerText = i.note || '無詳細內容...';
            updateDetailImg();
            document.getElementById('editBtn').onclick = () => openEdit(i);
            document.getElementById('deleteBtn').onclick = async () => { if(confirm('移除？')){ await db.items.delete(id); closeModal('detailModal'); renderUI(); }};
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function updateDetailImg() {
            const main = document.getElementById('detailMainImg');
            const thumb = document.getElementById('detailThumbnails');
            if (detailImgs.length > 0) {
                main.src = detailImgs[detailIdx];
                thumb.innerHTML = detailImgs.map((img, i) => `<img src="${img}" onclick="setIdx(${i})" class="h-full aspect-square object-cover rounded-lg border-2 ${i===detailIdx?'border-indigo-500':'border-transparent opacity-50'}">`).join('');
            } else { main.src = 'https://via.placeholder.com/600x800?text=NO+IMAGE'; thumb.innerHTML = ''; }
        }

        function setIdx(i){ detailIdx = i; updateDetailImg(); }
        function changeDetailImg(s){ if(detailImgs.length===0) return; detailIdx=(detailIdx+s+detailImgs.length)%detailImgs.length; updateDetailImg(); }

        async function openEdit(i) {
            closeModal('detailModal');
            document.getElementById('itemId').value = i.id;
            document.getElementById('itemName').value = i.name;
            document.getElementById('itemPublisher').value = i.publisher || '';
            document.getElementById('itemQty').value = i.qty || 1;
            document.getElementById('itemPrice').value = i.price || 0;
            document.getElementById('itemLocation').value = i.location || '';
            document.getElementById('itemDate').value = i.date || '';
            document.getElementById('itemNote').value = i.note || '';
            const root = await db.categories.where({parentId: 0, name: i.category}).first();
            if (root) { document.getElementById('itemCategory').value = root.id; await updateSubCatDropdown(); document.getElementById('itemSubCategory').value = i.subCategory || ''; }
            document.getElementById('modalTitle').innerText = '編輯收藏';
            document.getElementById('itemModal').classList.remove('hidden');
        }

        async function openManageModal() {
            const roots = await db.categories.where('parentId').equals(0).toArray();
            let html = "";
            for (let r of roots) {
                html += `<li class="flex justify-between items-center p-3 font-bold border-b text-slate-800"><span>● ${r.name}</span><button onclick="deleteCat(${r.id})" class="text-rose-300 hover:text-rose-500">✕</button></li>`;
                const subs = await db.categories.where('parentId').equals(Number(r.id)).toArray();
                subs.forEach(s => { html += `<li class="flex justify-between items-center p-3 pl-8 text-xs font-medium text-slate-500 bg-slate-50/50"><span>╰── ${s.name}</span><button onclick="deleteCat(${s.id})" class="text-rose-300 hover:text-rose-500 transition">✕</button></li>`; });
            }
            document.getElementById('manageList').innerHTML = html; document.getElementById('manageModal').classList.remove('hidden');
        }

        async function addCategory() {
            const pVal = document.getElementById('manageParent').value;
            const name = document.getElementById('newCatInput').value.trim();
            if (name) { await db.categories.add({name, parentId: Number(pVal)}); document.getElementById('newCatInput').value = ''; await renderUI(); await openManageModal(); }
        }

        async function deleteCat(id) { if(confirm('刪除標籤？')){ await db.categories.delete(id); await renderUI(); await openManageModal(); } }
        async function dangerReset() { if(confirm('⚠️ 注意：清空？')){ await db.delete(); location.reload(); } }
        function updateStats() { db.items.toArray().then(items => { document.getElementById('statCount').innerText = items.length; document.getElementById('statPrice').innerText = items.reduce((s,i)=>s+Number(i.price||0),0).toLocaleString(); }); }
        function setF(c,s){ curCat=c; curSub=s; renderUI(); }
        function closeModal(id){ document.getElementById(id).classList.add('hidden'); }
        function openAddModal() { document.getElementById('itemForm').reset(); document.getElementById('itemId').value=''; document.getElementById('modalTitle').innerText = '新增收藏項目'; document.getElementById('itemModal').classList.remove('hidden'); }
        function toBase64(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result); }); }
        async function exportData() { const d = { items: await db.items.toArray(), categories: await db.categories.toArray() }; const blob = new Blob([JSON.stringify(d)], {type:"application/json"}); const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download="vault_V14.json"; a.click(); }
        async function importData(e) { const reader = new FileReader(); reader.onload = async (ev) => { const d = JSON.parse(ev.target.result); if(d.categories) await db.categories.bulkPut(d.categories); if(d.items) await db.items.bulkAdd(d.items); location.reload(); }; reader.readAsText(e.target.files[0]); }

        startSystem();
    </script>
</body>
